<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Surface Main - Action & Prompt Lab</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --panel2: #1a2440;
      --line: #263554;
      --text: #e6edf7;
      --muted: #97a8c7;
      --accent: #14b8a6;
      --accent2: #0ea5e9;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(4, 8, 20, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(20, 184, 166, 0.14), transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(14, 165, 233, 0.14), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: "SF Pro Text", "Segoe UI", "PingFang SC", sans-serif;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 16, 32, 0.9);
      backdrop-filter: blur(8px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: #d8f8f4;
      flex: 1;
    }

    .status-pill {
      font-size: 12px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .topbar a {
      color: #8ec5ff;
      text-decoration: none;
      font-size: 12px;
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 420px;
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }

    .card {
      background: linear-gradient(180deg, rgba(25, 36, 64, 0.9), rgba(16, 24, 44, 0.9));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .workspace {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .toolbar input,
    .toolbar textarea,
    .sidebar textarea,
    .sidebar input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0d1528;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }

    .toolbar input:focus,
    .toolbar textarea:focus,
    .sidebar textarea:focus,
    .sidebar input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.25);
    }

    .toolbar .url-input {
      flex: 1;
      min-width: 280px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      color: #fff;
      background: #1f335a;
      cursor: pointer;
    }

    button:hover {
      border-color: #4e70ad;
    }

    .btn-main {
      background: linear-gradient(135deg, var(--accent), #0f766e);
    }

    .btn-alt {
      background: linear-gradient(135deg, #0284c7, #1d4ed8);
    }

    .workspace-grid {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .surface-window {
      border: 1px solid #36507d;
      border-radius: 12px;
      overflow: hidden;
      background: #0a1326;
      min-height: 220px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      position: relative;
      resize: both;
    }

    .surface-window.maximized {
      grid-column: 1 / -1;
      min-height: 460px;
      z-index: 2;
    }

    .surface-window.minimized .surface-body {
      display: none;
    }

    .surface-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #101b33;
      border-bottom: 1px solid #243a63;
      font-size: 12px;
    }

    .surface-title {
      flex: 1;
      color: #cce6ff;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .surface-head .state {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .surface-head button {
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 11px;
      background: #172746;
      color: #d1e4ff;
    }

    .surface-body {
      flex: 1;
      min-height: 180px;
    }

    .surface-body iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .sidebar {
      display: grid;
      grid-template-rows: repeat(5, minmax(110px, 1fr));
      gap: 10px;
      padding: 10px;
      min-height: 0;
      overflow: auto;
    }

    .panel {
      border: 1px solid #2b3e66;
      border-radius: 10px;
      padding: 10px;
      background: rgba(9, 18, 36, 0.7);
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel h2 {
      margin: 0;
      font-size: 12px;
      color: #b5d7ff;
      font-weight: 600;
    }

    .panel .row {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
    }

    .panel pre,
    .panel .log {
      margin: 0;
      border: 1px solid #283a63;
      border-radius: 8px;
      background: #0b1529;
      color: #dce8ff;
      padding: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      overflow: auto;
      min-height: 0;
      flex: 1;
    }

    .panel .list {
      border: 1px solid #283a63;
      border-radius: 8px;
      background: #0b1529;
      overflow: auto;
      padding: 8px;
      min-height: 0;
      flex: 1;
      font-size: 12px;
      line-height: 1.45;
      color: #dce8ff;
    }

    .muted {
      color: var(--muted);
      font-size: 11px;
    }

    .ok {
      color: var(--ok);
    }

    .err {
      color: var(--err);
    }

    @media (max-width: 1200px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        grid-template-rows: repeat(5, minmax(160px, auto));
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <h1>Surface Main / Action Dispatcher / Prompt Assembly</h1>
    <span id="globalStatus" class="status-pill">Idle</span>
    <a href="/page/chat/" target="_blank" rel="noreferrer noopener">打开 Chat 页面</a>
  </header>

  <main class="layout">
    <section class="card workspace">
      <div class="toolbar">
        <input id="surfaceUrlInput" class="url-input" type="text" value="/surface/demo-counter.html" />
        <button id="loadSurfaceBtn" class="btn-main">加载 Surface</button>
        <button id="loadUnsafeDemoBtn" class="btn-alt">加载权限示例</button>
      </div>
      <div id="surfaceWorkspace" class="workspace-grid"></div>
    </section>

    <aside class="card sidebar">
      <section class="panel">
        <h2>LLM JSON 流输入</h2>
        <textarea id="llmJsonInput" rows="4"></textarea>
        <div class="row">
          <label for="chunkSizeInput">chunk</label>
          <input id="chunkSizeInput" type="number" min="1" max="64" value="4" />
          <label for="chunkDelayInput">delay(ms)</label>
          <input id="chunkDelayInput" type="number" min="0" max="500" value="25" />
        </div>
        <div class="row">
          <button id="simulateStreamBtn" class="btn-main">模拟流式</button>
          <button id="submitOnceBtn">一次提交</button>
          <button id="clearHistoryBtn">清空历史</button>
        </div>
        <pre id="streamingPreview" class="log"></pre>
      </section>

      <section class="panel">
        <h2>消息历史（含 Observation）</h2>
        <div id="messageHistoryList" class="list"></div>
      </section>

      <section class="panel">
        <h2>Allowed Actions</h2>
        <div id="allowedActionsList" class="list"></div>
      </section>

      <section class="panel">
        <h2>Action Records</h2>
        <div id="actionRecordsList" class="list"></div>
      </section>

      <section class="panel">
        <h2>Prompt Assembly</h2>
        <textarea id="promptOverrideInput" rows="4"
          placeholder='可选 JSON 覆盖，例如 {"rules":["..."],"style":"concise"}'></textarea>
        <div class="row">
          <button id="assemblePromptBtn" class="btn-main">渲染 Prompt</button>
          <span id="promptMetaText" class="muted"></span>
        </div>
        <pre id="promptOutput" class="log"></pre>
      </section>
    </aside>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
