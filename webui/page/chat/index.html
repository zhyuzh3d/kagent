<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T0 MVP - 实时语音对话</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --panel2: #22252f;
      --text: #e2e8f0;
      --muted: #8892a4;
      --line: #2d3244;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --accent: #6366f1;
      --accent2: #818cf8;
      --user-bg: #374151;
      --ai-bg: #1e293b;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }

    .sidebar.collapsed {
      margin-left: -280px;
    }

    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg);
      position: relative;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 56px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 0;
    }

    .btn-toggle {
      background: transparent;
      padding: 8px;
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .btn-toggle:hover {
      background: var(--panel2);
    }

    .current-path {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .path-sep {
      color: var(--muted);
      font-weight: normal;
    }

    /* Sidebar Content Styles */
    .sidebar-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .project-item {
      margin-bottom: 4px;
    }

    .project-header {
      padding: 8px 16px 8px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      transition: background 0.2s;
      border-radius: 0 20px 20px 0;
      margin-right: 12px;
      position: relative;
    }

    .project-header:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .project-header.active {
      color: var(--accent2);
      background: rgba(99, 102, 241, 0.1);
    }

    .project-arrow {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
      color: var(--muted);
    }

    .project-item.expanded .project-arrow {
      transform: rotate(90deg);
    }

    .project-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thread-list {
      margin-left: 36px;
      margin-top: 2px;
      display: none;
      padding-right: 12px;
    }

    .project-item.expanded .thread-list {
      display: block;
    }

    .thread-item {
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      position: relative;
    }

    .thread-item:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
    }

    .thread-item.active {
      background: var(--accent);
      color: #fff !important;
    }

    .thread-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--line);
    }

    .btn-new-project {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--line);
      color: var(--muted);
      padding: 8px;
      font-size: 13px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .btn-new-project:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(99, 102, 241, 0.05);
    }

    .item-actions {
      display: none;
      align-items: center;
      gap: 4px;
    }

    .project-header:hover .item-actions,
    .thread-item:hover .item-actions {
      display: flex;
    }

    .btn-action {
      background: transparent;
      border: none;
      padding: 2px;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-action:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    /* Drag and Drop hints */
    .dragging {
      opacity: 0.5;
      background: var(--accent) !important;
    }

    .drop-target {
      border-top: 2px solid var(--accent);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--muted);
      transition: border-color 0.3s;
    }

    /* Flashing animations for data flow */
    @keyframes flashSend {
      0% {
        border-color: #ffffff;
        box-shadow: 0 0 6px #ffffff;
      }

      100% {
        border-color: var(--muted);
        box-shadow: none;
      }
    }

    @keyframes flashReceive {
      0% {
        border-color: var(--ok);
        box-shadow: 0 0 6px var(--ok);
      }

      100% {
        border-color: var(--muted);
        box-shadow: none;
      }
    }

    @keyframes flashError {
      0% {
        border-color: var(--err);
        box-shadow: 0 0 6px var(--err);
      }

      100% {
        border-color: var(--muted);
        box-shadow: none;
      }
    }

    .flash-send {
      animation: flashSend 0.3s ease-out;
    }

    .flash-receive {
      animation: flashReceive 0.3s ease-out;
    }

    .flash-error {
      animation: flashError 0.3s ease-out;
    }

    .status-text {
      font-size: 13px;
      color: var(--muted);
      min-width: 100px;
    }

    .version-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      font-family: "SF Mono", monospace;
    }

    button {
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-start {
      background: var(--accent);
      color: #fff;
    }

    .btn-start:hover:not(:disabled) {
      background: var(--accent2);
    }

    .btn-stop {
      background: var(--err);
      color: #fff;
    }

    .btn-stop:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-ghost,
    .btn-config,
    .btn-surface {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-config:hover:not(:disabled),
    .btn-surface:hover:not(:disabled),
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent2);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--panel2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--panel2);
      color: var(--text);
      border-bottom-left-radius: 4px;
      position: relative;
    }

    .msg.observer {
      align-self: flex-start;
      background: rgba(99, 102, 241, 0.08);
      color: var(--muted);
      border: 1px dashed rgba(129, 140, 248, 0.28);
      border-bottom-left-radius: 4px;
      position: relative;
    }

    .msg.partial {
      opacity: 0.6;
      font-style: italic;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 4px;
    }

    .history-no-more {
      text-align: center;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .msg-main {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.system .msg-main {
      text-align: center;
    }


    .msg-aside {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-aside {
      color: rgba(255, 255, 255, 0.82);
    }

    .msg-action-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid rgba(129, 140, 248, 0.65);
      background: rgba(99, 102, 241, 0.2);
      color: #c7d2fe;
      font-size: 10px;
      line-height: 16px;
      text-align: center;
      padding: 0 4px;
      display: none;
    }

    .msg.user .msg-action-badge {
      border-color: rgba(255, 255, 255, 0.65);
      color: #fff;
      background: rgba(255, 255, 255, 0.18);
    }

    .msg-debug {
      margin: 8px 0 0;
      padding: 8px;
      border-radius: 8px;
      border: 1px dashed rgba(129, 140, 248, 0.35);
      background: rgba(7, 10, 18, 0.35);
      font-size: 11px;
      color: #b9c1d8;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .msg.malformed {
      border: 1px solid rgba(239, 68, 68, 0.65);
      box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.2) inset;
    }

    .resize-handle {
      height: 6px;
      cursor: ns-resize;
      background: var(--line);
      flex-shrink: 0;
      display: none;
    }

    .resize-handle.visible {
      display: block;
    }

    .resize-handle:hover,
    .resize-handle.active {
      background: var(--accent);
    }

    .debug-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .debug-panel {
      height: 0;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }

    .debug-panel.open {
      height: 180px;
    }

    .debug-panel pre {
      margin: 0;
      padding: 8px 20px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 11px;
      color: var(--muted);
      font-family: "SF Mono", monospace;
      height: 100%;
      overflow-y: auto;
    }

    .config-shell {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .config-shell.open {
      pointer-events: auto;
    }

    .config-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 20, 0.54);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .config-shell.open .config-backdrop {
      opacity: 1;
    }

    .config-drawer {
      position: absolute;
      top: 0;
      left: 0;
      width: min(460px, 92vw);
      height: 100%;
      background: linear-gradient(180deg, rgba(18, 23, 37, 0.98), rgba(11, 15, 25, 0.98));
      border-right: 1px solid rgba(99, 102, 241, 0.25);
      box-shadow: 18px 0 36px rgba(0, 0, 0, 0.28);
      transform: translateX(-100%);
      transition: transform 0.24s ease;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
    }

    .config-shell.open .config-drawer {
      transform: translateX(0);
    }

    .surface-float-root {
      position: fixed;
      right: 18px;
      bottom: 22px;
      z-index: 18;
      pointer-events: none;
    }

    .surface-float-panel {
      width: min(560px, 94vw);
      height: min(520px, 72vh);
      border: 1px solid rgba(129, 140, 248, 0.35);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(18, 23, 37, 0.97), rgba(11, 16, 25, 0.97));
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      display: none;
      flex-direction: column;
      pointer-events: auto;
    }

    .surface-float-panel.open {
      display: flex;
    }

    .surface-float-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(129, 140, 248, 0.2);
      background: rgba(99, 102, 241, 0.08);
    }

    .surface-float-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent2);
      flex: 1;
    }

    .surface-float-actions {
      display: flex;
      gap: 6px;
    }

    .surface-float-actions button {
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 7px;
      background: rgba(18, 25, 42, 0.95);
      color: var(--text);
      border: 1px solid rgba(129, 140, 248, 0.2);
    }

    .surface-float-body {
      flex: 1;
      min-height: 0;
      background: rgba(10, 14, 23, 0.9);
      display: grid;
      grid-template-columns: minmax(210px, 42%) minmax(260px, 58%);
    }

    .surface-float-iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .surface-float-status {
      font-size: 11px;
      color: var(--muted);
      padding: 6px 10px;
      border-top: 1px solid rgba(129, 140, 248, 0.16);
      background: rgba(15, 20, 32, 0.72);
      font-family: "SF Mono", monospace;
    }

    .surface-manager-list {
      overflow: auto;
      border-right: 1px solid rgba(129, 140, 248, 0.22);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #dbe6ff;
    }

    .surface-manager-item {
      border: 1px solid rgba(129, 140, 248, 0.2);
      border-radius: 10px;
      padding: 8px;
      background: rgba(27, 37, 60, 0.5);
      display: grid;
      gap: 8px;
    }

    .surface-manager-meta {
      font-size: 11px;
      line-height: 1.45;
      color: #c7d2fe;
      word-break: break-word;
    }

    .surface-manager-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
      font-size: 11px;
      color: #dbeafe;
    }

    .surface-manager-actions button {
      border: 1px solid rgba(129, 140, 248, 0.35);
      border-radius: 8px;
      background: rgba(30, 41, 59, 0.95);
      color: #e2e8f0;
      padding: 4px 9px;
      font-size: 11px;
    }

    .surface-manager-actions button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .surface-manager-empty {
      font-size: 12px;
      color: #94a3b8;
      padding: 8px;
    }

    .surface-manager-workspace {
      overflow: auto;
      padding: 10px;
      background: #fff;
    }

    .surface-runtime-host {
      height: 100%;
      min-height: 240px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
    }

    .surface-runtime-title {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      padding: 8px 10px;
      background: #e2e8f0;
      border-bottom: 1px solid #cbd5e1;
    }

    .surface-runtime-host .surface-float-iframe {
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 720px) {
      .surface-float-panel {
        width: min(96vw, 620px);
        height: min(78vh, 620px);
      }

      .surface-float-body {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .surface-manager-list {
        border-right: 0;
        border-bottom: 1px solid rgba(129, 140, 248, 0.22);
      }
    }

    .config-drawer-head,
    .config-drawer-foot {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .config-drawer-foot {
      border-top: 1px solid var(--line);
      border-bottom: none;
      margin-top: auto;
    }

    .config-drawer-head h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .config-drawer-head p {
      font-size: 12px;
      color: var(--muted);
    }

    .config-tabs {
      display: flex;
      gap: 10px;
      padding: 16px 20px 0;
    }

    .config-tab {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 7px 14px;
    }

    .config-tab.active {
      color: #fff;
      border-color: var(--accent2);
      background: rgba(99, 102, 241, 0.18);
    }

    .config-status {
      min-height: 22px;
      padding: 12px 20px 0;
      font-size: 12px;
      color: var(--muted);
    }

    .config-status.pending {
      color: var(--warn);
    }

    .config-status.success {
      color: var(--ok);
    }

    .config-status.error {
      color: var(--err);
    }

    .config-body {
      padding: 16px 20px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .config-group {
      padding: 16px;
      border: 1px solid rgba(129, 140, 248, 0.12);
      border-radius: 16px;
      background: rgba(20, 25, 40, 0.76);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .config-group h3 {
      font-size: 14px;
      color: var(--accent2);
    }

    .config-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .config-group .config-field:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .config-field-top,
    .config-field-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .config-field-label {
      font-size: 13px;
      font-weight: 600;
    }

    .config-field-desc,
    .config-field-hint,
    .config-field-error {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .config-field-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .config-field-controls input[type="text"],
    .config-field-controls input[type="number"],
    .config-field-controls textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
    }

    .config-field-controls input[type="range"] {
      flex: 1;
    }

    .config-field-controls input[type="number"] {
      width: 110px;
    }

    .config-field-controls textarea {
      min-height: 96px;
      resize: vertical;
    }

    .config-field-error {
      color: var(--err);
    }

    .scope-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 22px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: 1px solid transparent;
    }

    .scope-m {
      color: #8b5cf6;
      border-color: rgba(139, 92, 246, 0.35);
      background: rgba(139, 92, 246, 0.15);
    }

    .scope-t {
      color: #f59e0b;

    }

    .scope-r {
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.35);
      background: rgba(16, 185, 129, 0.15);

      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.35);

    }

    .scope-a {
      color: #fb7185;
      border-color: rgba(251, 113, 133, 0.35);

    .config-empty {
      padding: 24px;
      border: 1px dashed var(--line);

    @media (max-width: 768px) {
      .header {
        flex-wrap: wrap;

        min-width: auto;

      .config-drawer {

      .config-field-controls input[type="number"] {

    /* ── User Avatar ─────────────────────────────── */
    .user-avatar-wrapper {

    .user-avatar-btn {
      width: 34px;

    .user-menu-name {

      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }

    .user-menu-item:hover {
      background: rgba(99, 102, 241, 0.12);
    }
  </style>
</head>

<body>
  <aside id="sidebar" class="sidebar">
    <!-- Sidebar content will be rendered here by sidebar-controller.js -->
    <div style="padding: 20px; color: var(--muted); font-size: 13px;">Loading projects...</div>
  </aside>

  <main class="main-container">
    <div class="header">
      <div class="header-left">
        <button id="sidebarToggle" class="btn-toggle" title="切换边栏">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <div id="currentPath" class="current-path">
          <span id="currentProjectName">Default Project</span>
          <span class="path-sep">/</span>
          <span id="currentThreadName">Default Thread</span>
        </div>
      </div>
      <div id="versionText" class="version-text"></div>
      <div id="statusDot" class="status-dot"></div>
      <div id="statusText" class="status-text">Idle</div>
      <button id="configBtn" class="btn-config">配置</button>
      <button id="surfaceBtn" class="btn-surface">Surface</button>
      <button id="showMoreBtn" class="btn-ghost">Show More: Off</button>
      <button id="startBtn" class="btn-start">开始对话</button>
      <button id="stopBtn" class="btn-stop" disabled>停止</button>
      <div class="user-avatar-wrapper">
        <button id="userAvatarBtn" class="user-avatar-btn" title="用户"></button>
        <div id="userMenu" class="user-menu">
          <div id="userMenuName" class="user-menu-name"></div>
          <div id="logoutBtn" class="user-menu-item">退出登录</div>
        </div>
      </div>
    </div>

    <div id="chatArea" class="chat-area"></div>
    <div id="configShell" class="config-shell"></div>
    <div id="surfaceFloatRoot" class="surface-float-root"></div>

    <div class="resize-handle" id="resizeHandle"></div>
    <div class="debug-toggle" id="debugToggle">▶ 调试日志</div>
    <div class="debug-panel" id="debugPanel">
      <pre id="debug"></pre>
    </div>
  </main>

  <!-- Auth guard: check JWT before loading any modules -->
  <script>
    (async function authGuard() {
      try {
        const resp = await fetch('/api/auth/me', { cache: 'no-store' });
        if (!resp.ok) throw new Error('not authenticated');
        const data = await resp.json();
        if (!data || !data.ok) throw new Error('not authenticated');
        // Store user info for later use
        window.__kagentUser = { user_id: data.user_id, username: data.username };
      } catch (_) {
        window.location.href = '/page/account/?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
        // Prevent further script execution
        throw new Error('redirecting to login');
      }
    })();
  </script>

  <script type="module">
    fetch('/api/debug/log', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ level: 'INFO', module: 'System', content: 'Script module start' }) }).catch(() => {});
    import { createAudioCapture } from './audio-capture.js';
    import { createAudioPlayback } from './audio-playback.js';
    import { createChatActionEngine } from './action-engine.js';
    import { createChatStore } from './chat-store.js';
    import { loadRuntimeConfig, loadConfigInfo, applyChatFrontendConfig, buildWorkerConfig } from './config-store.js';
    import { createConfigDrawer } from './config-drawer.js';
    import { createEventRouter } from './event-router.js';
    import { createSessionController } from './session-controller.js';
    import { createSurfaceBridge } from './surface-bridge.js';
    import { createSidebarController } from './sidebar-controller.js';

    // ===================================================================
    // Architecture: Main Thread (UI + AudioContext + Playback)
    //             + Web Worker (WebSocket + VAD timer + audio frame relay)
    //
    // Why: Chrome aggressively throttles main-thread timers and
    // AudioWorklet→main postMessage in background tabs. By putting
    // WebSocket + VAD in a Worker (never throttled), audio frames
    // keep flowing and silence detection stays accurate even when the
    // user switches to another window.
    // ===================================================================

    // ── App State ──────────────────────────────────────────────────────
    const App = {
      running: false,
      backendState: 'Idle',
      audioCtx: null,
      workletModuleCtx: null,
      mediaStream: null,
      sourceNode: null,
      workletNode: null,
      scriptNode: null,
      sinkNode: null,
      configDrawer: null,
      publicConfig: null,
      configInfo: { tabs: [], fields: {} },
      sampleRateIn: 48000,
      pcmQueue: [],
      frameSamples16k: 320,
      voiceThreshold: 0.018,
      utteranceSilenceMs: 500,
      bargeInThreshold: 0.08,
      bargeInMinFrames: 5,
      bargeInCooldownMs: 500,
      lastVoiceAt: 0,
      utteranceActive: false,
      lastInterruptAt: 0,
      sustainedHighRmsCount: 0,
      pendingChunkMeta: [],
      playbackQueue: [],
      playingBufferSource: null,
      isPlaying: false,
      playbackEpoch: 0,
      sessionEpoch: 0,
      currentTurn: 0,
      activeTurnId: 0,
      showMore: false,
      messages: [],
      currentAIMsg: null,
      currentPartialMsg: null,
      // Pre-roll ring buffer: keeps last N frames so ASR doesn't miss speech onset
      preRollBuffer: [],
      preRollMaxFrames: 5, // ~100ms at 16kHz/320 samples
      // Whether we're actively sending audio to ASR
      audioSending: false,
      // Frames since last voice activity (for tail audio)
      silentFramesSinceVoice: 0,
      silentTailFrames: 50, // ~1000ms of trailing audio to ensure ASR triggers end_window_size
      replyOnsetGuardUntil: 0,
      replyOnsetGuardMs: 1200,
      replyOnsetGuardTurn: 0,
      replyOnsetGuardLoggedTurn: 0,
    };

    const el = {
      startBtn: document.getElementById('startBtn'),
      stopBtn: document.getElementById('stopBtn'),
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      versionText: document.getElementById('versionText'),
      chatArea: document.getElementById('chatArea'),
      configBtn: document.getElementById('configBtn'),
      surfaceBtn: document.getElementById('surfaceBtn'),
      showMoreBtn: document.getElementById('showMoreBtn'),
      configShell: document.getElementById('configShell'),
      surfaceFloatRoot: document.getElementById('surfaceFloatRoot'),
      debug: document.getElementById('debug'),
      debugToggle: document.getElementById('debugToggle'),
      debugPanel: document.getElementById('debugPanel'),
      userAvatarBtn: document.getElementById('userAvatarBtn'),
      userMenu: document.getElementById('userMenu'),
      userMenuName: document.getElementById('userMenuName'),
      logoutBtn: document.getElementById('logoutBtn'),
      sidebar: document.getElementById('sidebar'),
      sidebarToggle: document.getElementById('sidebarToggle'),
      currentProjectName: document.getElementById('currentProjectName'),
      currentThreadName: document.getElementById('currentThreadName'),
    };

    // ── User Avatar Setup ───────────────────────────────────────
    {
      const user = window.__kagentUser || {};
      const name = user.username || '?';
      el.userAvatarBtn.textContent = name.charAt(0).toUpperCase();
      el.userMenuName.textContent = name;
      el.userAvatarBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        el.userMenu.classList.toggle('open');
      });
      document.addEventListener('click', () => {
        el.userMenu.classList.remove('open');
      });

      // Global error reporting to backend
      window.onerror = function(msg, url, line, col, error) {
        fetch('/api/debug/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level: 'CRITICAL', module: 'Browser', content: `JS Error: ${msg} at ${url}:${line}:${col}. Error: ${error ? error.stack : ''}` })
        }).catch(() => {});
      };
      window.onunhandledrejection = function(event) {
        fetch('/api/debug/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level: 'CRITICAL', module: 'Browser', content: `Unhandled Promise Rejection: ${event.reason}` })
        }).catch(() => {});
      };

      el.logoutBtn.addEventListener('click', async () => {
        try {
          await fetch('/api/auth/logout', { method: 'POST' });
        } catch (_) { }
        window.location.href = '/page/account/';
      });
    }

    let savedDebugHeight = 180;

    el.debugToggle.addEventListener('click', () => {
      const isOpen = el.debugPanel.classList.contains('open');
      if (isOpen) {
        // Closing: save current height
        savedDebugHeight = el.debugPanel.offsetHeight || savedDebugHeight;
        el.debugPanel.classList.remove('open');
        el.debugPanel.style.height = '0';
        document.getElementById('resizeHandle').classList.remove('visible');
        el.debugToggle.textContent = '▶ 调试日志';
      } else {
        // Opening: restore saved height
        el.debugPanel.classList.add('open');
        el.debugPanel.style.height = savedDebugHeight + 'px';
        document.getElementById('resizeHandle').classList.add('visible');
        el.debugToggle.textContent = '▼ 调试日志';
      }
    });

    // ── Drag-to-resize debug panel ──────────────────────────────────────
    {
      const handle = document.getElementById('resizeHandle');
      let dragging = false;
      let startY = 0;
      let startH = 0;

      handle.addEventListener('mousedown', (e) => {
        if (!el.debugPanel.classList.contains('open')) return;
        dragging = true;
        startY = e.clientY;
        startH = el.debugPanel.offsetHeight;
        handle.classList.add('active');
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startY - e.clientY;
        const newH = Math.max(60, Math.min(window.innerHeight * 0.7, startH + delta));
        el.debugPanel.style.height = newH + 'px';
        savedDebugHeight = newH;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('active');
      });
    }

    function snippet(text) {
      if (!text) return '""';
      const clean = text.trim();
      if (clean.length > 10) return '"' + clean.substring(0, 10) + '..."';
      return '"' + clean + '"';
    }

    // New format: 2026-03-08 10:45:12 [INFO] [AudioPipeline] [Turn:54] "你好，请..." -> TTS start sending...
    function appendDebug(level, module, turnId, text, action) {
      if (!action) {
        action = text;
        text = null;
      }

      // Forward to backend for debugging
      fetch('/api/debug/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ level: level, module: module || 'Client', content: action })
      }).catch(() => {});

      if (!el.debugPanel) return;

      const parts = [];

      // 1. Timestamp
      const d = new Date();
      const tzOffset = d.getTimezoneOffset() * 60000;
      const localISOTime = (new Date(d - tzOffset)).toISOString().slice(0, 19).replace('T', ' ');
      parts.push(localISOTime);

      // 2. Level
      parts.push(`[${level}]`);

      // 3. Module
      if (module) parts.push(`[${module}]`);

      // 4. TurnID
      if (turnId !== undefined && turnId !== null) {
        parts.push(`[Turn:${turnId}]`);
      }

      // 5. Text Snippet & Action
      if (text !== null && text !== undefined) {
        parts.push(`${snippet(text)} -> ${action}`);
      } else {
        parts.push(`-> ${action}`);
      }

      el.debug.textContent += parts.join(' ') + '\n';
      el.debug.scrollTop = el.debug.scrollHeight;
    }

    function syncWorkerConfig() {
      sessionController.syncWorkerConfig();
    }

    function applyPublicConfig(config) {
      applyChatFrontendConfig(App, config);
      applyUIConfig(App.publicConfig);
      syncWorkerConfig();
    }

    function applyUIConfig(config) {
      const showDebugPanel = !!((((config || {}).app || {}).ui || {}).showDebugPanelByDefault);
      if (showDebugPanel) {
        el.debugPanel.classList.add('open');
        el.debugPanel.style.height = savedDebugHeight + 'px';
        document.getElementById('resizeHandle').classList.add('visible');
        el.debugToggle.textContent = '▼ 调试日志';
        return;
      }
      el.debugPanel.classList.remove('open');
      el.debugPanel.style.height = '0';
      document.getElementById('resizeHandle').classList.remove('visible');
      el.debugToggle.textContent = '▶ 调试日志';
    }

    function setupConfigDrawer() {
      if (App.configDrawer) {
        App.configDrawer.setConfigInfo(App.configInfo);
        App.configDrawer.setConfig(App.publicConfig);
        return;
      }
      App.configDrawer = createConfigDrawer({
        mount: el.configShell,
        initialConfig: App.publicConfig,
        configInfo: App.configInfo,
        onConfigApplied: (config) => {
          applyPublicConfig(config);
        },
        onConfigSaved: (payload) => {
          reportConfigChange(payload);
        },
        onDebug: appendDebug,
      });
    }

    async function loadClientConfig() {
      const [publicConfig, configInfo] = await Promise.all([
        loadRuntimeConfig(),
        loadConfigInfo(),
      ]);
      App.configInfo = configInfo || { tabs: [], fields: {} };
      applyPublicConfig(publicConfig);
      setupConfigDrawer();
      if (App.configDrawer) {
        App.configDrawer.setConfig(App.publicConfig);
      }
      appendDebug('INFO', 'System', null, null, 'runtime config loaded');
    }

    async function loadVersion() {
      try {
        const resp = await fetch('/version', { cache: 'no-store' });
        if (!resp.ok) throw new Error(`status ${resp.status}`);
        const v = await resp.json();
        const backend = v.backend || 'unknown';
        const webui = v.webui || 'unknown';
        const s = `b${backend} ui${webui}`;
        el.versionText.textContent = s;
        appendDebug('INFO', 'System', null, null, `version ${s}`);
      } catch (err) {
        el.versionText.textContent = 'version unknown';
        appendDebug('ERROR', 'System', null, null, `version load failed: ${err.message || err}`);
      }
    }

    function setStatus(state) {
      App.backendState = state || App.backendState;
      el.statusText.textContent = state;
    }

    let flashTimeout = null;
    let lastFlashTime = 0;
    function flashIndicator(type) {
      // Throttle flashes to max once every 100ms to avoid UI stutter
      const now = Date.now();
      if (now - lastFlashTime < 100) return;
      lastFlashTime = now;

      // Force reflow to restart animation if it's already running
      el.statusDot.className = 'status-dot';
      void el.statusDot.offsetWidth;

      let cls = '';
      if (type === 'send') cls = 'flash-send';
      else if (type === 'receive') cls = 'flash-receive';
      else if (type === 'error') cls = 'flash-error';

      if (cls) el.statusDot.classList.add(cls);

      // Auto clear after animation completes
      if (flashTimeout) clearTimeout(flashTimeout);
      flashTimeout = setTimeout(() => {
        el.statusDot.className = 'status-dot';
      }, 300);
    }

    const chatStore = createChatStore({
      app: App,
      chatArea: el.chatArea,
    });

    function syncShowMoreButton() {
      el.showMoreBtn.textContent = App.showMore ? 'Show More: On' : 'Show More: Off';
      el.showMoreBtn.classList.toggle('btn-primary', App.showMore);
      el.showMoreBtn.classList.toggle('btn-ghost', !App.showMore);
      chatStore.setShowMore(App.showMore);
    }

    function toggleShowMore() {
      App.showMore = !App.showMore;
      syncShowMoreButton();
      chatStore.clearForJump();
      try {
        if (sessionController && typeof sessionController.workerSend === 'function') {
          sessionController.workerSend({
            type: 'send_control',
            control: 'fetch_history',
            extra: { limit: (App.pullHistorySize || 10) * 5, before_id: 0, show_more: !!App.showMore },
          });
        }
      } catch (_) { }
    }

    syncShowMoreButton();

    function reportActionRecord(payload) {
      const p = payload && typeof payload === 'object' ? payload : {};
      const turnId = Number.isFinite(p.turnId) ? p.turnId : (App.activeTurnId || App.currentTurn || 0);
      const actionName = typeof p.actionName === 'string' ? p.actionName : '';
      if (!actionName) return;
      sessionController.workerSend({
        type: 'send_control',
        control: 'action_result',
        reason: typeof p.category === 'string' && p.category ? p.category : 'dispatch',
        turn_id: turnId,
        text: typeof p.content === 'string' ? p.content : '',
        extra: {
          action_id: (typeof p.actionId === 'string' && p.actionId) ? p.actionId : `act-${Date.now()}-${Math.floor(Math.random() * 100000)}`,
          action_name: actionName,
          action_status: typeof p.status === 'string' && p.status ? p.status : 'unknown',
          action_followup: typeof p.followup === 'string' && p.followup ? p.followup : 'none',
          action_surface_id: typeof p.actionSurfaceID === 'string' ? p.actionSurfaceID : '',
          surface_type: typeof p.actionSurfaceType === 'string' ? p.actionSurfaceType : '',
          surface_version: typeof p.actionSurfaceVersion === 'string' ? p.actionSurfaceVersion : '',
          action_manual_confirm: typeof p.manualConfirm === 'string' ? p.manualConfirm : '',
          action_block_reason: typeof p.blockReason === 'string' ? p.blockReason : '',
          action_args: p.args && typeof p.args === 'object' ? p.args : {},
          action_result: p.result && typeof p.result === 'object' ? p.result : {},
          action_effect: p.effect && typeof p.effect === 'object' ? p.effect : {},
          action_state: p.state && typeof p.state === 'object' ? p.state : {},
        },
      });
    }

    function reportStateChange(payload) {
      const p = payload && typeof payload === 'object' ? payload : {};
      const turnId = Number.isFinite(p.turnId) ? p.turnId : (App.activeTurnId || App.currentTurn || 0);
      const surfaceId = typeof p.surface_id === 'string' ? p.surface_id : '';
      sessionController.workerSend({
        type: 'send_control',
        control: 'state_change',
        turn_id: turnId,
        extra: {
          surface_id: surfaceId,
          surface_type: typeof p.surface_type === 'string' ? p.surface_type : '',
          surface_version: typeof p.surface_version === 'string' ? p.surface_version : '',
          event_type: typeof p.event_type === 'string' ? p.event_type : 'state_change',
          business_state: p.business_state && typeof p.business_state === 'object' ? p.business_state : {},
          visible_text: typeof p.visible_text === 'string' ? p.visible_text : '',
          status: typeof p.status === 'string' ? p.status : 'ready',
          state_version: Number.isFinite(p.state_version) ? p.state_version : 0,
          updated_at_ms: Number.isFinite(p.updated_at_ms) ? p.updated_at_ms : Date.now(),
        },
      });
    }

    function reportConfigChange(payload) {
      const p = payload && typeof payload === 'object' ? payload : {};
      sessionController.workerSend({
        type: 'send_control',
        control: 'config_change',
        turn_id: App.activeTurnId || App.currentTurn || 0,
        extra: {
          config_source: typeof p.source === 'string' && p.source ? p.source : 'config_drawer',
          config_changed_paths: Array.isArray(p.changedPaths) ? p.changedPaths : [],
          config_snapshot: p.config && typeof p.config === 'object' ? p.config : {},
        },
      });
    }

    const surfaceBridge = createSurfaceBridge({
      root: el.surfaceFloatRoot,
      appendDebug,
      appendSystem: (text) => chatStore.addChatMsg('system', text, 0),
      reportActionRecord,
      onSurfaceEvent: (evt) => {
        const turnId = App.activeTurnId || App.currentTurn || 0;
        actionEngine.handleSurfaceEffect(turnId, evt);
      },
    });

    const actionEngine = createChatActionEngine({
      chatStore,
      surfaceBridge,
      appendDebug,
      appendSystem: (text) => chatStore.addChatMsg('system', text, 0),
      reportActionRecord,
      reportStateChange,
    });

    const audioPlayback = createAudioPlayback({
      app: App,
      appendDebug,
      flashIndicator,
    });

    const eventRouter = createEventRouter({
      app: App,
      chatStore,
      audioPlayback,
      setStatus,
      flashIndicator,
      appendDebug,
      onLLMDelta: ({ turnId, text }) => actionEngine.handleAssistantDelta(turnId, text || ''),
      onLLMFinal: ({ turnId, text }) => {
        actionEngine.handleAssistantFinal(turnId, text || '').catch((err) => {
          appendDebug('ERROR', 'ActionEngine', turnId, null, `handleAssistantFinal failed: ${err.message || err}`);
        });
      },
      onInterrupt: (turnId) => {
        if (sessionController && sessionController.workerSend) {
          sessionController.workerSend({
            type: 'send_control',
            control: 'interrupt',
            reason: 'commit_stop',
            turn_id: turnId || App.activeTurnId || App.currentTurn,
          });
        }
      },
    });

    const sessionController = createSessionController({
      app: App,
      workerURL: './io-worker.js',
      audioPlayback,
      chatStore,
      eventRouter,
      setStatus,
      setButtons,
      appendDebug,
      flashIndicator,
      getWorkerConfig: () => buildWorkerConfig(App.publicConfig),
    });
    App.workerSend = sessionController.workerSend;

    const audioCapture = createAudioCapture({
      app: App,
      audioPlayback,
      workerSend: sessionController.workerSend,
      setStatus,
      appendDebug,
      onBargeIn: (interruptedTurnId) => {
        sessionController.finalizeUtterance(interruptedTurnId);
      },
    });

    sessionController.bindAudioCapture(audioCapture);

    const sidebarController = createSidebarController({
      app: App,
      el,
      chatStore,
      sessionController,
      appendDebug,
    });

    function setButtons(running) {
      el.startBtn.disabled = running;
      el.stopBtn.disabled = !running;
    }

    // ── Start / Stop ───────────────────────────────────────────────────
    // ── Visibility change: force AudioContext resume ────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && App.running && App.audioCtx) {
        App.audioCtx.resume().then(() => appendDebug('INFO', 'AudioContext', null, null, 'AudioContext resumed on tab focus'));
      }
    });

    el.startBtn.addEventListener('click', () => {
      const ctx = sidebarController.getCurrentContext();
      sessionController.startAll(ctx.projectId, ctx.threadId);
    });
    el.stopBtn.addEventListener('click', () => sessionController.stopAll('手动停止'));
    el.configBtn.addEventListener('click', () => {
      if (App.configDrawer) App.configDrawer.toggle();
    });
    el.surfaceBtn.addEventListener('click', () => {
      surfaceBridge.toggleVisible();
    });
    el.showMoreBtn.addEventListener('click', () => {
      toggleShowMore();
    });

    el.sidebarToggle.addEventListener('click', () => {
      el.sidebar.classList.toggle('collapsed');
    });
    window.addEventListener('beforeunload', () => sessionController.stopAll(''));

    async function initPage() {
      await loadClientConfig();
      await loadVersion();
      await sidebarController.init();
      const ctx = sidebarController.getCurrentContext();
      await sessionController.initWorkerConnection(ctx.projectId, ctx.threadId);
    }

    initPage().catch((err) => {
      appendDebug('ERROR', 'System', null, null, `init failed: ${err.message || err}`);
      loadVersion();
    });
  </script>
</body>

</html>
