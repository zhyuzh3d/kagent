<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T0 MVP - 实时语音对话</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --panel2: #22252f;
      --text: #e2e8f0;
      --muted: #8892a4;
      --line: #2d3244;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --accent: #6366f1;
      --accent2: #818cf8;
      --user-bg: #374151;
      --ai-bg: #1e293b;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent2);
      flex: 1;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--muted);
      transition: border-color 0.3s;
    }

    /* Flashing animations for data flow */
    @keyframes flashSend {
      0% {
        border-color: #ffffff;
        box-shadow: 0 0 6px #ffffff;
      }

      100% {
        border-color: var(--muted);
        box-shadow: none;
      }
    }

    @keyframes flashReceive {
      0% {
        border-color: var(--ok);
        box-shadow: 0 0 6px var(--ok);
      }

      100% {
        border-color: var(--muted);
        box-shadow: none;
      }
    }

    @keyframes flashError {
      0% {
        border-color: var(--err);
        box-shadow: 0 0 6px var(--err);
      }

      100% {
        border-color: var(--muted);
        box-shadow: none;
      }
    }

    .flash-send {
      animation: flashSend 0.3s ease-out;
    }

    .flash-receive {
      animation: flashReceive 0.3s ease-out;
    }

    .flash-error {
      animation: flashError 0.3s ease-out;
    }

    .status-text {
      font-size: 13px;
      color: var(--muted);
      min-width: 100px;
    }

    .version-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      font-family: "SF Mono", monospace;
    }

    button {
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-start {
      background: var(--accent);
      color: #fff;
    }

    .btn-start:hover:not(:disabled) {
      background: var(--accent2);
    }

    .btn-stop {
      background: var(--err);
      color: #fff;
    }

    .btn-stop:hover:not(:disabled) {
      opacity: 0.85;
    }

    .btn-ghost,
    .btn-config,
    .btn-surface {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-config:hover:not(:disabled),
    .btn-surface:hover:not(:disabled),
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent2);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--panel2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg.partial {
      opacity: 0.6;
      font-style: italic;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 4px;
    }

    .resize-handle {
      height: 6px;
      cursor: ns-resize;
      background: var(--line);
      flex-shrink: 0;
      display: none;
    }

    .resize-handle.visible {
      display: block;
    }

    .resize-handle:hover,
    .resize-handle.active {
      background: var(--accent);
    }

    .debug-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .debug-panel {
      height: 0;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }

    .debug-panel.open {
      height: 180px;
    }

    .debug-panel pre {
      margin: 0;
      padding: 8px 20px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 11px;
      color: var(--muted);
      font-family: "SF Mono", monospace;
      height: 100%;
      overflow-y: auto;
    }

    .config-shell {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .config-shell.open {
      pointer-events: auto;
    }

    .config-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(4, 8, 20, 0.54);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .config-shell.open .config-backdrop {
      opacity: 1;
    }

    .config-drawer {
      position: absolute;
      top: 0;
      left: 0;
      width: min(460px, 92vw);
      height: 100%;
      background: linear-gradient(180deg, rgba(18, 23, 37, 0.98), rgba(11, 15, 25, 0.98));
      border-right: 1px solid rgba(99, 102, 241, 0.25);
      box-shadow: 18px 0 36px rgba(0, 0, 0, 0.28);
      transform: translateX(-100%);
      transition: transform 0.24s ease;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
    }

    .config-shell.open .config-drawer {
      transform: translateX(0);
    }

    .surface-float-root {
      position: fixed;
      right: 18px;
      bottom: 22px;
      z-index: 18;
      pointer-events: none;
    }

    .surface-float-panel {
      width: min(380px, 88vw);
      height: 280px;
      border: 1px solid rgba(129, 140, 248, 0.35);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(18, 23, 37, 0.97), rgba(11, 16, 25, 0.97));
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      display: none;
      flex-direction: column;
      pointer-events: auto;
    }

    .surface-float-panel.open {
      display: flex;
    }

    .surface-float-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(129, 140, 248, 0.2);
      background: rgba(99, 102, 241, 0.08);
    }

    .surface-float-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent2);
      flex: 1;
    }

    .surface-float-actions {
      display: flex;
      gap: 6px;
    }

    .surface-float-actions button {
      padding: 5px 8px;
      font-size: 11px;
      border-radius: 7px;
      background: rgba(18, 25, 42, 0.95);
      color: var(--text);
      border: 1px solid rgba(129, 140, 248, 0.2);
    }

    .surface-float-body {
      flex: 1;
      background: #fff;
    }

    .surface-float-iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .surface-float-status {
      font-size: 11px;
      color: var(--muted);
      padding: 6px 10px;
      border-top: 1px solid rgba(129, 140, 248, 0.16);
      background: rgba(15, 20, 32, 0.72);
      font-family: "SF Mono", monospace;
    }

    .config-drawer-head,
    .config-drawer-foot {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .config-drawer-foot {
      border-top: 1px solid var(--line);
      border-bottom: none;
      margin-top: auto;
    }

    .config-drawer-head h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .config-drawer-head p {
      font-size: 12px;
      color: var(--muted);
    }

    .config-tabs {
      display: flex;
      gap: 10px;
      padding: 16px 20px 0;
    }

    .config-tab {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 7px 14px;
    }

    .config-tab.active {
      color: #fff;
      border-color: var(--accent2);
      background: rgba(99, 102, 241, 0.18);
    }

    .config-status {
      min-height: 22px;
      padding: 12px 20px 0;
      font-size: 12px;
      color: var(--muted);
    }

    .config-status.pending {
      color: var(--warn);
    }

    .config-status.success {
      color: var(--ok);
    }

    .config-status.error {
      color: var(--err);
    }

    .config-body {
      padding: 16px 20px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .config-group {
      padding: 16px;
      border: 1px solid rgba(129, 140, 248, 0.12);
      border-radius: 16px;
      background: rgba(20, 25, 40, 0.76);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .config-group h3 {
      font-size: 14px;
      color: var(--accent2);
    }

    .config-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .config-group .config-field:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .config-field-top,
    .config-field-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .config-field-label {
      font-size: 13px;
      font-weight: 600;
    }

    .config-field-desc,
    .config-field-hint,
    .config-field-error {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .config-field-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .config-field-controls input[type="text"],
    .config-field-controls input[type="number"],
    .config-field-controls textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
    }

    .config-field-controls input[type="range"] {
      flex: 1;
    }

    .config-field-controls input[type="number"] {
      width: 110px;
    }

    .config-field-controls textarea {
      min-height: 96px;
      resize: vertical;
    }

    .config-field-error {
      color: var(--err);
    }

    .scope-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      height: 22px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: 1px solid transparent;
    }

    .scope-m {
      color: #8b5cf6;
      border-color: rgba(139, 92, 246, 0.35);
      background: rgba(139, 92, 246, 0.15);
    }

    .scope-t {
      color: #f59e0b;
      border-color: rgba(245, 158, 11, 0.35);
      background: rgba(245, 158, 11, 0.15);
    }

    .scope-r {
      color: #10b981;
      border-color: rgba(16, 185, 129, 0.35);
      background: rgba(16, 185, 129, 0.15);
    }

    .scope-c {
      color: #38bdf8;
      border-color: rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.15);
    }

    .scope-a {
      color: #fb7185;
      border-color: rgba(251, 113, 133, 0.35);
      background: rgba(251, 113, 133, 0.15);
    }

    .config-empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 768px) {
      .header {
        flex-wrap: wrap;
      }

      .status-text {
        min-width: auto;
      }

      .config-drawer {
        width: 100vw;
      }

      .config-field-controls {
        flex-direction: column;
        align-items: stretch;
      }

      .config-field-controls input[type="number"] {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>糖糖 T0</h1>
    <div id="versionText" class="version-text"></div>
    <div id="statusDot" class="status-dot"></div>
    <div id="statusText" class="status-text">Idle</div>
    <button id="configBtn" class="btn-config">配置</button>
    <button id="surfaceBtn" class="btn-surface">Surface</button>
    <button id="startBtn" class="btn-start">开始对话</button>
    <button id="stopBtn" class="btn-stop" disabled>停止</button>
  </div>

  <div id="chatArea" class="chat-area"></div>
  <div id="configShell" class="config-shell"></div>
  <div id="surfaceFloatRoot" class="surface-float-root"></div>

  <div class="resize-handle" id="resizeHandle"></div>
  <div class="debug-toggle" id="debugToggle">▶ 调试日志</div>
  <div class="debug-panel" id="debugPanel">
    <pre id="debug"></pre>
  </div>

  <script type="module">
    import { createAudioCapture } from './audio-capture.js';
    import { createAudioPlayback } from './audio-playback.js';
    import { createChatActionEngine } from './action-engine.js';
    import { createChatStore } from './chat-store.js';
    import { loadRuntimeConfig, loadConfigInfo, applyChatFrontendConfig, buildWorkerConfig } from './config-store.js';
    import { createConfigDrawer } from './config-drawer.js';
    import { createEventRouter } from './event-router.js';
    import { createSessionController } from './session-controller.js';
    import { createSurfaceBridge } from './surface-bridge.js';

    // ===================================================================
    // Architecture: Main Thread (UI + AudioContext + Playback)
    //             + Web Worker (WebSocket + VAD timer + audio frame relay)
    //
    // Why: Chrome aggressively throttles main-thread timers and
    // AudioWorklet→main postMessage in background tabs. By putting
    // WebSocket + VAD in a Worker (never throttled), audio frames
    // keep flowing and silence detection stays accurate even when the
    // user switches to another window.
    // ===================================================================

    // ── App State ──────────────────────────────────────────────────────
    const App = {
      running: false,
      backendState: 'Idle',
      audioCtx: null,
      workletModuleCtx: null,
      mediaStream: null,
      sourceNode: null,
      workletNode: null,
      scriptNode: null,
      sinkNode: null,
      configDrawer: null,
      publicConfig: null,
      configInfo: { tabs: [], fields: {} },
      sampleRateIn: 48000,
      pcmQueue: [],
      frameSamples16k: 320,
      voiceThreshold: 0.018,
      utteranceSilenceMs: 500,
      bargeInThreshold: 0.08,
      bargeInMinFrames: 5,
      bargeInCooldownMs: 500,
      lastVoiceAt: 0,
      utteranceActive: false,
      lastInterruptAt: 0,
      sustainedHighRmsCount: 0,
      pendingChunkMeta: [],
      playbackQueue: [],
      playingBufferSource: null,
      isPlaying: false,
      playbackEpoch: 0,
      sessionEpoch: 0,
      currentTurn: 0,
      activeTurnId: 0,
      messages: [],
      currentAIMsg: null,
      currentPartialMsg: null,
      // Pre-roll ring buffer: keeps last N frames so ASR doesn't miss speech onset
      preRollBuffer: [],
      preRollMaxFrames: 5, // ~100ms at 16kHz/320 samples
      // Whether we're actively sending audio to ASR
      audioSending: false,
      // Frames since last voice activity (for tail audio)
      silentFramesSinceVoice: 0,
      silentTailFrames: 50, // ~1000ms of trailing audio to ensure ASR triggers end_window_size
      replyOnsetGuardUntil: 0,
      replyOnsetGuardMs: 1200,
      replyOnsetGuardTurn: 0,
      replyOnsetGuardLoggedTurn: 0,
    };

    const el = {
      startBtn: document.getElementById('startBtn'),
      stopBtn: document.getElementById('stopBtn'),
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      versionText: document.getElementById('versionText'),
      chatArea: document.getElementById('chatArea'),
      configBtn: document.getElementById('configBtn'),
      surfaceBtn: document.getElementById('surfaceBtn'),
      configShell: document.getElementById('configShell'),
      surfaceFloatRoot: document.getElementById('surfaceFloatRoot'),
      debug: document.getElementById('debug'),
      debugToggle: document.getElementById('debugToggle'),
      debugPanel: document.getElementById('debugPanel'),
    };

    let savedDebugHeight = 180;

    el.debugToggle.addEventListener('click', () => {
      const isOpen = el.debugPanel.classList.contains('open');
      if (isOpen) {
        // Closing: save current height
        savedDebugHeight = el.debugPanel.offsetHeight || savedDebugHeight;
        el.debugPanel.classList.remove('open');
        el.debugPanel.style.height = '0';
        document.getElementById('resizeHandle').classList.remove('visible');
        el.debugToggle.textContent = '▶ 调试日志';
      } else {
        // Opening: restore saved height
        el.debugPanel.classList.add('open');
        el.debugPanel.style.height = savedDebugHeight + 'px';
        document.getElementById('resizeHandle').classList.add('visible');
        el.debugToggle.textContent = '▼ 调试日志';
      }
    });

    // ── Drag-to-resize debug panel ──────────────────────────────────────
    {
      const handle = document.getElementById('resizeHandle');
      let dragging = false;
      let startY = 0;
      let startH = 0;

      handle.addEventListener('mousedown', (e) => {
        if (!el.debugPanel.classList.contains('open')) return;
        dragging = true;
        startY = e.clientY;
        startH = el.debugPanel.offsetHeight;
        handle.classList.add('active');
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startY - e.clientY;
        const newH = Math.max(60, Math.min(window.innerHeight * 0.7, startH + delta));
        el.debugPanel.style.height = newH + 'px';
        savedDebugHeight = newH;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('active');
      });
    }

    function snippet(text) {
      if (!text) return '""';
      const clean = text.trim();
      if (clean.length > 10) return '"' + clean.substring(0, 10) + '..."';
      return '"' + clean + '"';
    }

    // New format: 2026-03-08 10:45:12 [INFO] [AudioPipeline] [Turn:54] "你好，请..." -> TTS start sending...
    function appendDebug(level, module, turnId, text, action) {
      if (!action) {
        action = text;
        text = null;
      }

      const parts = [];

      // 1. Timestamp
      const d = new Date();
      const tzOffset = d.getTimezoneOffset() * 60000;
      const localISOTime = (new Date(d - tzOffset)).toISOString().slice(0, 19).replace('T', ' ');
      parts.push(localISOTime);

      // 2. Level
      parts.push(`[${level}]`);

      // 3. Module
      if (module) parts.push(`[${module}]`);

      // 4. TurnID
      if (turnId !== undefined && turnId !== null) {
        parts.push(`[Turn:${turnId}]`);
      }

      // 5. Text Snippet & Action
      if (text !== null && text !== undefined) {
        parts.push(`${snippet(text)} -> ${action}`);
      } else {
        parts.push(`-> ${action}`);
      }

      el.debug.textContent += parts.join(' ') + '\n';
      el.debug.scrollTop = el.debug.scrollHeight;
    }

    function syncWorkerConfig() {
      sessionController.syncWorkerConfig();
    }

    function applyPublicConfig(config) {
      applyChatFrontendConfig(App, config);
      applyUIConfig(App.publicConfig);
      syncWorkerConfig();
    }

    function applyUIConfig(config) {
      const showDebugPanel = !!((((config || {}).app || {}).ui || {}).showDebugPanelByDefault);
      if (showDebugPanel) {
        el.debugPanel.classList.add('open');
        el.debugPanel.style.height = savedDebugHeight + 'px';
        document.getElementById('resizeHandle').classList.add('visible');
        el.debugToggle.textContent = '▼ 调试日志';
        return;
      }
      el.debugPanel.classList.remove('open');
      el.debugPanel.style.height = '0';
      document.getElementById('resizeHandle').classList.remove('visible');
      el.debugToggle.textContent = '▶ 调试日志';
    }

    function setupConfigDrawer() {
      if (App.configDrawer) {
        App.configDrawer.setConfigInfo(App.configInfo);
        App.configDrawer.setConfig(App.publicConfig);
        return;
      }
      App.configDrawer = createConfigDrawer({
        mount: el.configShell,
        initialConfig: App.publicConfig,
        configInfo: App.configInfo,
        onConfigApplied: (config) => {
          applyPublicConfig(config);
        },
        onDebug: appendDebug,
      });
    }

    async function loadClientConfig() {
      const [publicConfig, configInfo] = await Promise.all([
        loadRuntimeConfig(),
        loadConfigInfo(),
      ]);
      App.configInfo = configInfo || { tabs: [], fields: {} };
      applyPublicConfig(publicConfig);
      setupConfigDrawer();
      if (App.configDrawer) {
        App.configDrawer.setConfig(App.publicConfig);
      }
      appendDebug('INFO', 'System', null, null, 'runtime config loaded');
    }

    async function loadVersion() {
      try {
        const resp = await fetch('/version', { cache: 'no-store' });
        if (!resp.ok) throw new Error(`status ${resp.status}`);
        const v = await resp.json();
        const backend = v.backend || 'unknown';
        const webui = v.webui || 'unknown';
        const s = `b${backend} ui${webui}`;
        el.versionText.textContent = s;
        appendDebug('INFO', 'System', null, null, `version ${s}`);
      } catch (err) {
        el.versionText.textContent = 'version unknown';
        appendDebug('ERROR', 'System', null, null, `version load failed: ${err.message || err}`);
      }
    }

    function setStatus(state) {
      App.backendState = state || App.backendState;
      el.statusText.textContent = state;
    }

    let flashTimeout = null;
    let lastFlashTime = 0;
    function flashIndicator(type) {
      // Throttle flashes to max once every 100ms to avoid UI stutter
      const now = Date.now();
      if (now - lastFlashTime < 100) return;
      lastFlashTime = now;

      // Force reflow to restart animation if it's already running
      el.statusDot.className = 'status-dot';
      void el.statusDot.offsetWidth;

      let cls = '';
      if (type === 'send') cls = 'flash-send';
      else if (type === 'receive') cls = 'flash-receive';
      else if (type === 'error') cls = 'flash-error';

      if (cls) el.statusDot.classList.add(cls);

      // Auto clear after animation completes
      if (flashTimeout) clearTimeout(flashTimeout);
      flashTimeout = setTimeout(() => {
        el.statusDot.className = 'status-dot';
      }, 300);
    }

    const chatStore = createChatStore({
      app: App,
      chatArea: el.chatArea,
    });

    function reportActionRecord(payload) {
      const p = payload && typeof payload === 'object' ? payload : {};
      const turnId = Number.isFinite(p.turnId) ? p.turnId : (App.activeTurnId || App.currentTurn || 0);
      const actionName = typeof p.actionName === 'string' ? p.actionName : '';
      if (!actionName) return;
      sessionController.workerSend({
        type: 'send_control',
        control: 'action_result',
        reason: typeof p.category === 'string' && p.category ? p.category : 'dispatch',
        turn_id: turnId,
        text: typeof p.content === 'string' ? p.content : '',
        extra: {
          action_id: (typeof p.actionId === 'string' && p.actionId) ? p.actionId : `act-${Date.now()}-${Math.floor(Math.random() * 100000)}`,
          action_name: actionName,
          action_status: typeof p.status === 'string' && p.status ? p.status : 'unknown',
          action_followup: typeof p.followup === 'string' && p.followup ? p.followup : 'none',
          action_surface_id: typeof p.actionSurfaceID === 'string' && p.actionSurfaceID ? p.actionSurfaceID : 'counter',
          action_manual_confirm: typeof p.manualConfirm === 'string' ? p.manualConfirm : '',
          action_block_reason: typeof p.blockReason === 'string' ? p.blockReason : '',
          action_args: p.args && typeof p.args === 'object' ? p.args : {},
          action_result: p.result && typeof p.result === 'object' ? p.result : {},
          action_effect: p.effect && typeof p.effect === 'object' ? p.effect : {},
          action_state: p.state && typeof p.state === 'object' ? p.state : {},
        },
      });
    }

    function reportStateChange(payload) {
      const p = payload && typeof payload === 'object' ? payload : {};
      const turnId = Number.isFinite(p.turnId) ? p.turnId : (App.activeTurnId || App.currentTurn || 0);
      const surfaceId = typeof p.surface_id === 'string' && p.surface_id ? p.surface_id : 'counter';
      sessionController.workerSend({
        type: 'send_control',
        control: 'state_change',
        turn_id: turnId,
        extra: {
          surface_id: surfaceId,
          event_type: typeof p.event_type === 'string' ? p.event_type : 'state_change',
          business_state: p.business_state && typeof p.business_state === 'object' ? p.business_state : {},
          visible_text: typeof p.visible_text === 'string' ? p.visible_text : '',
          status: typeof p.status === 'string' ? p.status : 'ready',
          state_version: Number.isFinite(p.state_version) ? p.state_version : 0,
          updated_at_ms: Number.isFinite(p.updated_at_ms) ? p.updated_at_ms : Date.now(),
        },
      });
    }

    const surfaceBridge = createSurfaceBridge({
      root: el.surfaceFloatRoot,
      surfaceURL: '/surface/demo-counter.html',
      appendDebug,
      onSurfaceEvent: (evt) => {
        const turnId = App.activeTurnId || App.currentTurn || 0;
        actionEngine.handleSurfaceEffect(turnId, evt);
      },
    });

    const actionEngine = createChatActionEngine({
      chatStore,
      surfaceBridge,
      appendDebug,
      appendSystem: (text) => chatStore.addChatMsg('system', text, 0),
      reportActionRecord,
      reportStateChange,
    });

    const audioPlayback = createAudioPlayback({
      app: App,
      appendDebug,
      flashIndicator,
    });

    const eventRouter = createEventRouter({
      app: App,
      chatStore,
      audioPlayback,
      setStatus,
      flashIndicator,
      appendDebug,
      onLLMDelta: ({ turnId, text }) => actionEngine.handleAssistantDelta(turnId, text || ''),
      onLLMFinal: ({ turnId, text }) => {
        actionEngine.handleAssistantFinal(turnId, text || '').catch((err) => {
          appendDebug('ERROR', 'ActionEngine', turnId, null, `handleAssistantFinal failed: ${err.message || err}`);
        });
      },
    });

    const sessionController = createSessionController({
      app: App,
      workerURL: './io-worker.js',
      audioPlayback,
      chatStore,
      eventRouter,
      setStatus,
      setButtons,
      appendDebug,
      flashIndicator,
      getWorkerConfig: () => buildWorkerConfig(App.publicConfig),
    });

    const audioCapture = createAudioCapture({
      app: App,
      audioPlayback,
      workerSend: sessionController.workerSend,
      setStatus,
      appendDebug,
      onBargeIn: (interruptedTurnId) => {
        sessionController.finalizeUtterance(interruptedTurnId);
      },
    });

    sessionController.bindAudioCapture(audioCapture);

    function setButtons(running) {
      el.startBtn.disabled = running;
      el.stopBtn.disabled = !running;
    }

    // ── Start / Stop ───────────────────────────────────────────────────
    // ── Visibility change: force AudioContext resume ────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && App.running && App.audioCtx) {
        App.audioCtx.resume().then(() => appendDebug('INFO', 'AudioContext', null, null, 'AudioContext resumed on tab focus'));
      }
    });

    el.startBtn.addEventListener('click', () => sessionController.startAll());
    el.stopBtn.addEventListener('click', () => sessionController.stopAll('手动停止'));
    el.configBtn.addEventListener('click', () => {
      if (App.configDrawer) App.configDrawer.toggle();
    });
    el.surfaceBtn.addEventListener('click', () => {
      surfaceBridge.toggleVisible();
    });
    window.addEventListener('beforeunload', () => sessionController.stopAll(''));

    async function initPage() {
      await loadClientConfig();
      await loadVersion();
      await sessionController.initWorkerConnection();
    }

    initPage().catch((err) => {
      appendDebug('ERROR', 'System', null, null, `init failed: ${err.message || err}`);
      loadVersion();
    });
  </script>
</body>

</html>
