<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Counter Surface</title>
  <style>
    body {
      margin: 0;
      font-family: "SF Pro Text", "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(155deg, #f8fafc, #dbeafe);
      color: #0f172a;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(92vw, 380px);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.18);
      padding: 14px;
      text-align: center;
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .count {
      font-size: 58px;
      line-height: 1;
      font-weight: 800;
      margin: 10px 0 14px;
      color: #1d4ed8;
    }

    .btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
      background: #eff6ff;
      color: #1e3a8a;
    }

    .meta {
      margin-top: 10px;
      font-size: 11px;
      color: #334155;
      min-height: 16px;
      line-height: 1.4;
      text-align: left;
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="title">Counter Surface</div>
    <div id="countValue" class="count">0</div>
    <div class="btns">
      <button id="incBtn">+1</button>
      <button id="decBtn">-1</button>
      <button id="resetBtn">Reset</button>
      <button id="flashBtn">Flash</button>
    </div>
    <div id="metaText" class="meta">等待 mainsurface 握手...</div>
  </div>

  <script>
    let count = 0;
    let stateVersion = 0;
    let surfacePort = null;
    let surfaceID = "";
    let surfaceType = "app";
    let surfaceVersion = "1.0";
    let sessionToken = "";
    let requestSeq = 0;

    const fsWaiters = new Map();
    const hostWaiters = new Map();

    const countEl = document.getElementById("countValue");
    const metaEl = document.getElementById("metaText");

    const ACTIONS = [
      { name: "get_state", description: "读取当前计数器状态", args_schema: {} },
      { name: "set_count", description: "设置计数器", args_schema: { count: "number" } },
      { name: "increment", description: "按 step 增加计数", args_schema: { step: "number" } },
      { name: "reset", description: "重置为 0", args_schema: {} },
      { name: "flash_notice", description: "调用主页面 flash 提示", args_schema: { message: "string" } }
    ];

    function render() {
      countEl.textContent = String(count);
    }

    function appendMeta(text) {
      metaEl.textContent = `${text}\nstate_version=${stateVersion}\nsurface_id=${surfaceID || "(pending)"}`;
    }

    function businessState() {
      return { count };
    }

    function visibleText() {
      return String(count);
    }

    function snapshot(eventType) {
      return {
        type: "state_change",
        surface_id: surfaceID,
        surface_type: surfaceType,
        surface_version: surfaceVersion,
        event_type: eventType || "state_change",
        business_state: businessState(),
        visible_text: visibleText(),
        status: "ready",
        state_version: stateVersion,
        updated_at_ms: Date.now(),
      };
    }

    function postToMain(msg) {
      if (!surfacePort) return;
      try {
        surfacePort.postMessage(msg);
      } catch (_) {}
    }

    function emitStateChange(eventType) {
      stateVersion += 1;
      postToMain(snapshot(eventType));
    }

    function emitActionResult(action, status, result, errorText) {
      postToMain({
        type: "action_result",
        action_id: action && action.id ? action.id : "",
        action_name: action && action.name ? action.name : "",
        status: status || "ok",
        result: result && typeof result === "object" ? result : {},
        error: errorText || "",
        surface_id: surfaceID,
        surface_type: surfaceType,
        surface_version: surfaceVersion,
        business_state: businessState(),
        visible_text: visibleText(),
        state_version: stateVersion,
        updated_at_ms: Date.now(),
      });
    }

    function encodeBase64(text) {
      const bytes = new TextEncoder().encode(text);
      let raw = "";
      for (const b of bytes) raw += String.fromCharCode(b);
      return btoa(raw);
    }

    function decodeBase64(base64Text) {
      const raw = atob(base64Text);
      const bytes = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i += 1) bytes[i] = raw.charCodeAt(i);
      return new TextDecoder().decode(bytes);
    }

    function nextRequestID(prefix) {
      requestSeq += 1;
      return `${prefix}-${Date.now()}-${requestSeq}`;
    }

    function requestSurfaceFS(op, payload, timeoutMs = 4000) {
      if (!surfacePort) return Promise.reject(new Error("surface channel not ready"));
      const requestID = nextRequestID("fs");
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          fsWaiters.delete(requestID);
          reject(new Error(`surfacefs timeout (${op})`));
        }, timeoutMs);
        fsWaiters.set(requestID, { resolve, reject, timer, op });
        postToMain({
          type: "surfacefs_request",
          request_id: requestID,
          op,
          ...(payload && typeof payload === "object" ? payload : {}),
        });
      });
    }

    function requestHost(capability, args, timeoutMs = 3000) {
      if (!surfacePort) return Promise.reject(new Error("surface channel not ready"));
      const callID = nextRequestID("host");
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          hostWaiters.delete(callID);
          reject(new Error(`host timeout (${capability})`));
        }, timeoutMs);
        hostWaiters.set(callID, { resolve, reject, timer, capability });
        postToMain({
          type: "host_call",
          call_id: callID,
          capability,
          args: args && typeof args === "object" ? args : {},
        });
      });
    }

    async function loadStateFromFS() {
      try {
        const resp = await requestSurfaceFS("read", { path: "state.json" }, 3500);
        const payload = resp && resp.payload && typeof resp.payload === "object" ? resp.payload : {};
        const dataBase64 = typeof payload.data_base64 === "string" ? payload.data_base64 : "";
        if (!dataBase64) return false;
        const raw = decodeBase64(dataBase64);
        const parsed = JSON.parse(raw);
        if (parsed && Number.isFinite(parsed.count)) {
          count = Math.floor(parsed.count);
        }
        if (parsed && Number.isFinite(parsed.state_version)) {
          stateVersion = parsed.state_version;
        }
        render();
        appendMeta("已从 surfacefs 恢复状态");
        return true;
      } catch (err) {
        appendMeta(`surfacefs 读取失败（首次可忽略）: ${err.message || err}`);
        return false;
      }
    }

    async function persistStateToFS(reason) {
      try {
        const raw = JSON.stringify({
          count,
          state_version: stateVersion,
          updated_at_ms: Date.now(),
          reason: reason || "state_change",
        });
        await requestSurfaceFS("write", {
          path: "state.json",
          data_base64: encodeBase64(raw),
        });
      } catch (err) {
        appendMeta(`surfacefs 写入失败: ${err.message || err}`);
      }
    }

    async function callHostFlash(message) {
      try {
        const resp = await requestHost("flash", { message });
        appendMeta(`host.flash: ${resp && resp.ok ? "ok" : "fail"}`);
        return !!(resp && resp.ok);
      } catch (err) {
        appendMeta(`host.flash failed: ${err.message || err}`);
        return false;
      }
    }

    async function applyActionCall(action) {
      if (!action || typeof action !== "object") return;
      const name = typeof action.name === "string" ? action.name : "";
      const args = action.args && typeof action.args === "object" ? action.args : {};

      if (name === "get_state") {
        emitActionResult(action, "ok", { from_surface: true });
        return;
      }

      if (name === "set_count") {
        if (!Number.isFinite(args.count)) {
          emitActionResult(action, "fail", {}, "count must be a number");
          return;
        }
        count = Math.floor(args.count);
        render();
        emitStateChange("action_call.set_count");
        await persistStateToFS("set_count");
        emitActionResult(action, "ok", { changed: true });
        return;
      }

      if (name === "increment") {
        const step = Number.isFinite(args.step) ? args.step : 1;
        count += step;
        render();
        emitStateChange("action_call.increment");
        await persistStateToFS("increment");
        emitActionResult(action, "ok", { changed: true });
        return;
      }

      if (name === "reset") {
        count = 0;
        render();
        emitStateChange("action_call.reset");
        await persistStateToFS("reset");
        emitActionResult(action, "ok", { changed: true });
        return;
      }

      if (name === "flash_notice") {
        const message = typeof args.message === "string" && args.message.trim()
          ? args.message.trim()
          : `当前计数：${count}`;
        const ok = await callHostFlash(`[Counter Surface] ${message}`);
        emitActionResult(action, ok ? "ok" : "fail", { delivered: ok }, ok ? "" : "host flash failed");
        return;
      }

      emitActionResult(action, "fail", {}, `unknown action: ${name}`);
    }

    function onMainMessage(msg) {
      if (!msg || typeof msg !== "object") return;
      if (msg.type === "action_call") {
        applyActionCall(msg.action || {}).catch((err) => {
          emitActionResult(msg.action || {}, "fail", {}, err.message || String(err));
        });
        return;
      }
      if (msg.type === "surfacefs_response") {
        const requestID = typeof msg.request_id === "string" ? msg.request_id : "";
        const waiter = fsWaiters.get(requestID);
        if (!waiter) return;
        fsWaiters.delete(requestID);
        clearTimeout(waiter.timer);
        if (msg.ok) waiter.resolve(msg);
        else waiter.reject(new Error(msg.error || `surfacefs ${waiter.op} failed`));
        return;
      }
      if (msg.type === "host_call_result") {
        const callID = typeof msg.call_id === "string" ? msg.call_id : "";
        const waiter = hostWaiters.get(callID);
        if (!waiter) return;
        hostWaiters.delete(callID);
        clearTimeout(waiter.timer);
        waiter.resolve(msg);
        return;
      }
      if (msg.type === "ping") {
        postToMain({ type: "surface_pong", ts: Date.now() });
      }
    }

    async function onConnected() {
      await loadStateFromFS();
      postToMain({
        type: "surface_ready",
        surface_id: surfaceID,
        session_token: sessionToken,
        capabilities: { get_state: true },
        actions: ACTIONS,
        state: snapshot("init.ready"),
      });
      emitStateChange("init.connected");
    }

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "surface_connect") return;
      const port = event.ports && event.ports[0];
      if (!port) return;
      surfaceID = typeof data.surface_id === "string" ? data.surface_id : "";
      surfaceType = typeof data.surface_type === "string" ? data.surface_type : "app";
      surfaceVersion = typeof data.surface_version === "string" ? data.surface_version : "1.0";
      sessionToken = typeof data.session_token === "string" ? data.session_token : "";
      surfacePort = port;
      surfacePort.onmessage = (ev) => onMainMessage(ev.data);
      surfacePort.start();
      appendMeta(`已连接 mainsurface: ${surfaceID || "(unknown)"}`);
      onConnected().catch((err) => {
        appendMeta(`初始化失败: ${err.message || err}`);
      });
    });

    document.getElementById("incBtn").addEventListener("click", async () => {
      count += 1;
      render();
      emitStateChange("local_click.inc");
      await persistStateToFS("local_inc");
    });

    document.getElementById("decBtn").addEventListener("click", async () => {
      count -= 1;
      render();
      emitStateChange("local_click.dec");
      await persistStateToFS("local_dec");
    });

    document.getElementById("resetBtn").addEventListener("click", async () => {
      count = 0;
      render();
      emitStateChange("local_click.reset");
      await persistStateToFS("local_reset");
    });

    document.getElementById("flashBtn").addEventListener("click", async () => {
      await callHostFlash(`按钮触发，count=${count}`);
    });

    render();
  </script>
</body>

</html>
