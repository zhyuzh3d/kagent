<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T0 MVP - 实时语音对话</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --panel2: #22252f;
      --text: #e2e8f0;
      --muted: #8892a4;
      --line: #2d3244;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --accent: #6366f1;
      --accent2: #818cf8;
      --user-bg: #374151;
      --ai-bg: #1e293b;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent2);
      flex: 1;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.listening {
      background: var(--ok);
      animation: pulse 1.5s infinite;
    }

    .status-dot.thinking {
      background: var(--warn);
      animation: pulse 0.8s infinite;
    }

    .status-dot.speaking {
      background: var(--accent);
      animation: pulse 1s infinite;
    }

    .status-dot.error {
      background: var(--err);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .status-text {
      font-size: 13px;
      color: var(--muted);
      min-width: 100px;
    }

    .version-text {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      font-family: "SF Mono", monospace;
    }

    button {
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-start {
      background: var(--accent);
      color: #fff;
    }

    .btn-start:hover:not(:disabled) {
      background: var(--accent2);
    }

    .btn-stop {
      background: var(--err);
      color: #fff;
    }

    .btn-stop:hover:not(:disabled) {
      opacity: 0.85;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--panel2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg.partial {
      opacity: 0.6;
      font-style: italic;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      padding: 4px;
    }

    .resize-handle {
      height: 6px;
      cursor: ns-resize;
      background: var(--line);
      flex-shrink: 0;
      display: none;
    }

    .resize-handle.visible {
      display: block;
    }

    .resize-handle:hover,
    .resize-handle.active {
      background: var(--accent);
    }

    .debug-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      background: var(--panel);
      border-top: 1px solid var(--line);
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .debug-panel {
      height: 0;
      overflow: hidden;
      background: var(--bg);
      flex-shrink: 0;
    }

    .debug-panel.open {
      height: 180px;
    }

    .debug-panel pre {
      margin: 0;
      padding: 8px 20px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 11px;
      color: var(--muted);
      font-family: "SF Mono", monospace;
      height: 100%;
      overflow-y: auto;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>糖糖 T0</h1>
    <div id="versionText" class="version-text"></div>
    <div id="statusDot" class="status-dot"></div>
    <div id="statusText" class="status-text">Idle</div>
    <button id="startBtn" class="btn-start">开始对话</button>
    <button id="stopBtn" class="btn-stop" disabled>停止</button>
  </div>

  <div id="chatArea" class="chat-area"></div>

  <div class="resize-handle" id="resizeHandle"></div>
  <div class="debug-toggle" id="debugToggle">▶ 调试日志</div>
  <div class="debug-panel" id="debugPanel">
    <pre id="debug"></pre>
  </div>

  <script>
    // ===================================================================
    // Architecture: Main Thread (UI + AudioContext + Playback)
    //             + Web Worker (WebSocket + VAD timer + audio frame relay)
    //
    // Why: Chrome aggressively throttles main-thread timers and
    // AudioWorklet→main postMessage in background tabs. By putting
    // WebSocket + VAD in a Worker (never throttled), audio frames
    // keep flowing and silence detection stays accurate even when the
    // user switches to another window.
    // ===================================================================

    // ── Inline Worker Code ─────────────────────────────────────────────
    const workerCode = `
      let ws = null;
      let running = false;
      let utteranceActive = false;
      let lastVoiceAt = 0;
      let lastUtteranceEndAt = 0;
      const UTTERANCE_SILENCE_MS = 500;
      const VOICE_THRESHOLD = 0.018;
      let vadTimer = null;

      function wsReady() { return ws && ws.readyState === 1; }

      function sendControl(type, reason, turn_id, text) {
        if (!wsReady()) return;
        const p = { type };
        if (reason) p.reason = reason;
        if (turn_id) p.turn_id = turn_id;
        if (text) p.text = text;
        ws.send(JSON.stringify(p));
      }

      // VAD timer runs in Worker — never throttled
      function startVAD() {
        if (vadTimer) clearInterval(vadTimer);
        vadTimer = setInterval(() => {
          if (!running || !wsReady()) return;
          if (!utteranceActive) return;
          if (Date.now() - lastVoiceAt >= UTTERANCE_SILENCE_MS) {
            utteranceActive = false;
            if (Date.now() - lastUtteranceEndAt < 2000) return;
            lastUtteranceEndAt = Date.now();
            self.postMessage({ type: 'vad_utterance_end' });
          }
        }, 100);
      }

      function stopVAD() {
        if (vadTimer) { clearInterval(vadTimer); vadTimer = null; }
        utteranceActive = false;
      }

      self.onmessage = function(e) {
        const msg = e.data;
        if (!msg || !msg.type) return;

        switch (msg.type) {
          case 'connect': {
            const url = msg.url;
            ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';
            ws.onopen = () => {
              self.postMessage({ type: 'ws_open' });
            };
            ws.onclose = () => {
              self.postMessage({ type: 'ws_close' });
            };
            ws.onerror = () => {
              self.postMessage({ type: 'ws_error' });
            };
            ws.onmessage = (ev) => {
              if (typeof ev.data === 'string') {
                self.postMessage({ type: 'ws_text', data: ev.data });
              } else if (ev.data instanceof ArrayBuffer) {
                self.postMessage({ type: 'ws_binary', data: ev.data }, [ev.data]);
              }
            };
            break;
          }
          case 'send_control':
            sendControl(msg.control, msg.reason, msg.turn_id, msg.text);
            break;
          case 'send_audio':
            // Binary audio frame from AudioWorklet -> forward to WS
            if (wsReady()) ws.send(msg.data);
            break;
          case 'voice_detected':
            lastVoiceAt = Date.now();
            utteranceActive = true;
            lastUtteranceEndAt = 0;
            break;
          case 'set_ai_loud':
            // When AI is playing, prevent VAD from firing utterance_end
            if (msg.value) lastVoiceAt = Date.now();
            break;
          case 'start':
            running = true;
            startVAD();
            sendControl('start', null, msg.turn_id);
            break;
          case 'stop':
            running = false;
            stopVAD();
            sendControl('stop', null, msg.turn_id);
            if (ws) { ws.close(); ws = null; }
            break;
          case 'interrupt':
            sendControl('interrupt', 'barge_in');
            break;
          case 'disconnect':
            running = false;
            stopVAD();
            if (ws) { try { ws.close(); } catch(_) {} ws = null; }
            break;
        }
      };
    `;

    // ── Create Worker ──────────────────────────────────────────────────
    const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
    const workerURL = URL.createObjectURL(workerBlob);
    let ioWorker = null;

    // ── App State ──────────────────────────────────────────────────────
    const App = {
      running: false,
      backendState: 'Idle',
      audioCtx: null,
      mediaStream: null,
      sourceNode: null,
      workletNode: null,
      scriptNode: null,
      sinkNode: null,
      sampleRateIn: 48000,
      pcmQueue: [],
      frameSamples16k: 320,
      voiceThreshold: 0.018,
      utteranceSilenceMs: 500,
      lastVoiceAt: 0,
      utteranceActive: false,
      lastInterruptAt: 0,
      sustainedHighRmsCount: 0,
      pendingChunkMeta: [],
      playbackQueue: [],
      playingBufferSource: null,
      isPlaying: false,
      currentTurn: 0,
      activeTurnId: 0,
      messages: [],
      currentAIMsg: null,
      currentPartialMsg: null,
      // Pre-roll ring buffer: keeps last N frames so ASR doesn't miss speech onset
      preRollBuffer: [],
      preRollMaxFrames: 5, // ~100ms at 16kHz/320 samples
      // Whether we're actively sending audio to ASR
      audioSending: false,
      // Frames since last voice activity (for tail audio)
      silentFramesSinceVoice: 0,
      silentTailFrames: 50, // ~1000ms of trailing audio to ensure ASR triggers end_window_size
    };

    const el = {
      startBtn: document.getElementById('startBtn'),
      stopBtn: document.getElementById('stopBtn'),
      statusDot: document.getElementById('statusDot'),
      statusText: document.getElementById('statusText'),
      versionText: document.getElementById('versionText'),
      chatArea: document.getElementById('chatArea'),
      debug: document.getElementById('debug'),
      debugToggle: document.getElementById('debugToggle'),
      debugPanel: document.getElementById('debugPanel'),
    };

    let savedDebugHeight = 180;

    el.debugToggle.addEventListener('click', () => {
      const isOpen = el.debugPanel.classList.contains('open');
      if (isOpen) {
        // Closing: save current height
        savedDebugHeight = el.debugPanel.offsetHeight || savedDebugHeight;
        el.debugPanel.classList.remove('open');
        el.debugPanel.style.height = '0';
        document.getElementById('resizeHandle').classList.remove('visible');
        el.debugToggle.textContent = '▶ 调试日志';
      } else {
        // Opening: restore saved height
        el.debugPanel.classList.add('open');
        el.debugPanel.style.height = savedDebugHeight + 'px';
        document.getElementById('resizeHandle').classList.add('visible');
        el.debugToggle.textContent = '▼ 调试日志';
      }
    });

    // ── Drag-to-resize debug panel ──────────────────────────────────────
    {
      const handle = document.getElementById('resizeHandle');
      let dragging = false;
      let startY = 0;
      let startH = 0;

      handle.addEventListener('mousedown', (e) => {
        if (!el.debugPanel.classList.contains('open')) return;
        dragging = true;
        startY = e.clientY;
        startH = el.debugPanel.offsetHeight;
        handle.classList.add('active');
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startY - e.clientY;
        const newH = Math.max(60, Math.min(window.innerHeight * 0.7, startH + delta));
        el.debugPanel.style.height = newH + 'px';
        savedDebugHeight = newH;
      });

      document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('active');
      });
    }

    function appendDebug(line) {
      const ts = new Date().toISOString();
      el.debug.textContent += `[${ts}] ${line}\n`;
      el.debug.scrollTop = el.debug.scrollHeight;
    }

    async function loadVersion() {
      try {
        const resp = await fetch('/version', { cache: 'no-store' });
        if (!resp.ok) throw new Error(`status ${resp.status}`);
        const v = await resp.json();
        const backend = v.backend || 'unknown';
        const webui = v.webui || 'unknown';
        const s = `b${backend} ui${webui}`;
        el.versionText.textContent = s;
        appendDebug(`version ${s}`);
      } catch (err) {
        el.versionText.textContent = 'version unknown';
        appendDebug(`version load failed: ${err.message || err}`);
      }
    }

    function setStatus(state, cls) {
      App.backendState = state || App.backendState;
      el.statusText.textContent = state;
      el.statusDot.className = 'status-dot';
      if (cls) el.statusDot.classList.add(cls);
    }

    function setButtons(running) {
      el.startBtn.disabled = running;
      el.stopBtn.disabled = !running;
    }

    function addChatMsg(role, text, turnId, isPartial = false) {
      const div = document.createElement('div');
      div.className = `msg ${role} ${isPartial ? 'partial' : ''}`;
      div.dataset.turnId = turnId;
      div.innerHTML = isPartial ? `<em>${text}</em>` : text;
      el.chatArea.appendChild(div);
      el.chatArea.scrollTop = el.chatArea.scrollHeight;
      const msg = { role, text, turnId, element: div, isPartial };
      App.messages.push(msg);
      return msg;
    }

    function findUserMsg(turnId) {
      for (let i = App.messages.length - 1; i >= 0; i--) {
        const m = App.messages[i];
        if (m.role === 'user' && m.turnId === turnId) return m;
      }
      return null;
    }

    function updatePartialASR(text, turnId) {
      if (!text) return;
      let msg = findUserMsg(turnId);
      if (!msg) {
        msg = addChatMsg('user', text, turnId, true);
      } else {
        msg.text = text;
        msg.element.innerHTML = `<em>${text}</em>`;
        el.chatArea.scrollTop = el.chatArea.scrollHeight;
      }
    }

    function finalizeASR(text, turnId) {
      let msg = findUserMsg(turnId);
      if (msg) {
        msg.text = text;
        msg.isPartial = false;
        if (text) {
          msg.element.innerHTML = text;
        } else {
          msg.element.remove();
          App.messages = App.messages.filter(m => m !== msg);
        }
        msg.element.classList.remove('partial');
      } else if (text) {
        addChatMsg('user', text, turnId);
      }
    }

    function appendAIDelta(text, turnId) {
      if (!App.currentAIMsg || App.currentAIMsg.turnId !== turnId) {
        App.currentAIMsg = addChatMsg('ai', '', turnId);
      }
      App.currentAIMsg.text += text;
      App.currentAIMsg.element.textContent = App.currentAIMsg.text;
      el.chatArea.scrollTop = el.chatArea.scrollHeight;
    }

    function finalizeAI(turnId) {
      if (App.currentAIMsg && App.currentAIMsg.turnId === turnId) {
        App.currentAIMsg = null;
      }
    }

    // ── Worker message handler (receives WS data from Worker) ──────────
    function setupWorker() {
      if (ioWorker) { ioWorker.terminate(); }
      ioWorker = new Worker(workerURL);
      ioWorker.onmessage = (e) => {
        const msg = e.data;
        if (!msg) return;
        switch (msg.type) {
          case 'ws_open':
            appendDebug('ws connected (via worker)');
            break;
          case 'ws_close':
            appendDebug('ws closed (via worker)');
            if (App.running) stopAll('ws closed');
            break;
          case 'ws_error':
            appendDebug('ws error (via worker)');
            break;
          case 'ws_text':
            try { handleEvent(JSON.parse(msg.data)); } catch (_) { }
            break;
          case 'ws_binary':
            handleAudioBinary(msg.data);
            break;
          case 'vad_utterance_end':
            App.utteranceActive = false;
            App.sustainedHighRmsCount = 0;

            // Client-Driven Architecture: Explicitly command the backend to run LLM
            let finalText = "";
            let msgObj = findUserMsg(App.currentTurn);
            if (msgObj) {
              finalText = msgObj.text;
              msgObj.isPartial = false;
              msgObj.element.classList.remove('partial'); // finalize visual instantly
            }
            workerSend({ type: 'send_control', control: 'trigger_llm', turn_id: App.currentTurn, text: finalText });

            appendDebug(`Frontend triggered LLM (trigger_llm) for Turn ${App.currentTurn}`);
            break;
        }
      };
    }

    function workerSend(msg, transferables) {
      if (ioWorker) ioWorker.postMessage(msg, transferables || []);
    }

    function handleEvent(msg) {
      const type = msg.type;
      if (!type) return;

      // Status and error messages must ALWAYS be processed (never filtered by Turn-ID).
      // They carry session-wide state changes (e.g., Listening after interrupt).
      if (type === 'status') {
        const v = msg.value || '';
        const cls = v === 'Error' ? 'error' : v === 'Speaking' ? 'speaking' : v === 'Thinking' ? 'thinking' : (v === 'Listening' || v === 'Recognizing') ? 'listening' : '';
        setStatus(v, cls);
        appendDebug(`status=${v} detail=${msg.detail || ''} turn=${msg.turn_id || 0}`);
        return;
      }
      if (type === 'error') {
        setStatus('Error', 'error');
        appendDebug(`error code=${msg.code || ''} message=${msg.message || ''}`);
        return;
      }

      // Backend confirms utterance_end had no ASR text — roll back activeTurnId
      if (type === 'turn_nack') {
        App.activeTurnId = Math.max(App.activeTurnId - 1, msg.turn_id || 0);
        appendDebug(`turn_nack received, activeTurnId rolled back to ${App.activeTurnId}`);
        return;
      }

      // Turn-ID filter: The Iron Wall of Client-Driven Optimistic Locking
      // If the backend sends ANY data (partial/final ASR, LLM tokens) that doesn't match
      // the exact Turn ID the frontend is presently observing, it is SILENTLY DISCARDED.
      if (msg.turn_id && msg.turn_id !== App.currentTurn) {
        appendDebug(`Stale msg dropped: type=${type} turn=${msg.turn_id} (current=${App.currentTurn})`);
        return;
      }

      if (type === 'asr_partial') { updatePartialASR(msg.text || '', msg.turn_id); return; }
      if (type === 'asr_final') { finalizeASR(msg.text || '', msg.turn_id); return; }
      if (type === 'llm_delta') { appendAIDelta(msg.text || '', msg.turn_id); return; }
      if (type === 'llm_final') { finalizeAI(msg.turn_id); return; }
      if (type === 'tts_chunk') { App.pendingChunkMeta.push(msg); return; }
    }

    function handleAudioBinary(buf) {
      const meta = App.pendingChunkMeta.shift();
      if (!meta) { appendDebug('binary arrived without tts_chunk metadata'); return; }
      if (meta.turn_id < App.activeTurnId) {
        appendDebug(`Stale TTS chunk dropped: turn=${meta.turn_id} (active=${App.activeTurnId})`);
        return;
      }
      const format = (meta.format || 'audio/mpeg').toLowerCase();
      App.playbackQueue.push({ format, data: buf, turnId: meta.turn_id, seq: meta.seq });
      playNext();
    }

    // ── Playback (AudioContext — stays on main thread) ─────────────────
    function ensurePlaybackContext() {
      if (!App.audioCtx) App.audioCtx = new AudioContext();
      return App.audioCtx;
    }

    function playNext() {
      if (App.isPlaying) return;
      const item = App.playbackQueue.shift();
      if (!item) { App.isPlaying = false; return; }
      App.isPlaying = true;
      const ctx = ensurePlaybackContext();
      if (ctx.state === 'suspended') {
        ctx.resume().then(() => {
          if (item.format.includes('pcm')) { playPCMItem(item); } else { playBlobItem(item); }
        }).catch(() => { App.isPlaying = false; playNext(); });
        return;
      }
      if (item.format.includes('pcm')) { playPCMItem(item); } else { playBlobItem(item); }
    }

    function playBlobItem(item) {
      const ctx = ensurePlaybackContext();
      const dataCopy = item.data.slice(0);
      const successCb = (buffer) => {
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        src.connect(ctx.destination);
        App.playingBufferSource = src;
        src.onended = () => { App.playingBufferSource = null; App.isPlaying = false; playNext(); };
        src.start();
      };
      const errorCb = (err) => {
        appendDebug('decodeAudioData error: ' + (err ? (err.message || err) : 'unknown'));
        App.isPlaying = false;
        playNext();
      };
      try {
        const promise = ctx.decodeAudioData(dataCopy, successCb, errorCb);
        if (promise) promise.catch(errorCb);
      } catch (e) { errorCb(e); }
    }

    function playPCMItem(item) {
      const ctx = ensurePlaybackContext();
      try {
        let data = item.data;
        if (data.byteLength % 2 !== 0) data = data.slice(0, data.byteLength - 1);
        const raw = new Int16Array(data);
        const buffer = ctx.createBuffer(1, raw.length, 24000);
        const ch = buffer.getChannelData(0);
        for (let i = 0; i < raw.length; i++) ch[i] = Math.max(-1, Math.min(1, raw[i] / 32768));
        const src = ctx.createBufferSource();
        src.buffer = buffer;
        src.connect(ctx.destination);
        App.playingBufferSource = src;
        src.onended = () => { App.playingBufferSource = null; App.isPlaying = false; playNext(); };
        src.start();
      } catch (err) {
        appendDebug('PCM format error: ' + err.message);
        App.isPlaying = false;
        playNext();
      }
    }

    function stopPlayback() {
      App.playbackQueue = [];
      App.pendingChunkMeta = [];
      App.isPlaying = false;
      if (App.playingBufferSource) { try { App.playingBufferSource.stop(); } catch (_) { } App.playingBufferSource = null; }
    }

    // ── Microphone capture ─────────────────────────────────────────────
    async function startMic() {
      if (App.mediaStream) return;
      App.mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      });
      const ctx = ensurePlaybackContext();
      await ctx.resume();
      App.sampleRateIn = ctx.sampleRate;
      App.sourceNode = ctx.createMediaStreamSource(App.mediaStream);
      App.sinkNode = ctx.createGain();
      App.sinkNode.gain.value = 0;
      App.sinkNode.connect(ctx.destination);

      let workletOk = false;
      try {
        const code = `class PCMProcessor extends AudioWorkletProcessor {
          process(inputs) { const i = inputs[0]; if (i && i[0]) this.port.postMessage(i[0]); return true; }
        } registerProcessor('pcm-processor', PCMProcessor);`;
        const blobURL = URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
        await ctx.audioWorklet.addModule(blobURL);
        URL.revokeObjectURL(blobURL);
        App.workletNode = new AudioWorkletNode(ctx, 'pcm-processor');
        App.workletNode.port.onmessage = (e) => handleFloatChunk(e.data);
        App.sourceNode.connect(App.workletNode);
        App.workletNode.connect(App.sinkNode);
        workletOk = true;
        appendDebug('audio path: AudioWorklet');
      } catch (err) {
        appendDebug(`worklet fallback: ${err.message}`);
      }
      if (!workletOk) {
        App.scriptNode = ctx.createScriptProcessor(4096, 1, 1);
        App.scriptNode.onaudioprocess = (e) => handleFloatChunk(e.inputBuffer.getChannelData(0));
        App.sourceNode.connect(App.scriptNode);
        App.scriptNode.connect(App.sinkNode);
      }
    }

    function stopMic() {
      if (App.workletNode) { try { App.workletNode.disconnect(); } catch (_) { } App.workletNode = null; }
      if (App.scriptNode) { try { App.scriptNode.disconnect(); } catch (_) { } App.scriptNode = null; }
      if (App.sourceNode) { try { App.sourceNode.disconnect(); } catch (_) { } App.sourceNode = null; }
      if (App.mediaStream) { for (const t of App.mediaStream.getTracks()) t.stop(); App.mediaStream = null; }
      App.pcmQueue = [];
      App.utteranceActive = false;
      App.sustainedHighRmsCount = 0;
    }

    // ── Audio processing (main thread) ─────────────────────────────────
    // Handles: RMS calculation, barge-in detection, downsampling,
    // forwarding PCM frames to Worker for WebSocket sending.
    // VAD silence detection is handled by the Worker's setInterval.
    function handleFloatChunk(floatChunk) {
      let rms = 0;
      for (let i = 0; i < floatChunk.length; i++) rms += floatChunk[i] * floatChunk[i];
      rms = Math.sqrt(rms / Math.max(1, floatChunk.length));

      const aiLoud = App.backendState === 'Speaking' || App.isPlaying || App.playbackQueue.length > 0;
      const dynamicBargeThresh = 0.08;
      const currentVoiceThresh = aiLoud ? dynamicBargeThresh : App.voiceThreshold;

      // Tell Worker about AI playback state so it can suppress VAD
      workerSend({ type: 'set_ai_loud', value: aiLoud });

      if (rms > currentVoiceThresh) {
        App.lastVoiceAt = Date.now();
        if (!App.utteranceActive) {
          // This is the absolute START of a brand new utterance from complete silence
          App.currentTurn++;
          App.activeTurnId = App.currentTurn;
          workerSend({ type: 'send_control', control: 'start_listen', turn_id: App.currentTurn });
          appendDebug(`Speech Onset -> Turn incremented to ${App.currentTurn}`);
        }
        App.utteranceActive = true;
        workerSend({ type: 'voice_detected' });
        if (aiLoud) {
          App.sustainedHighRmsCount++;
        }
      } else {
        if (aiLoud && App.sustainedHighRmsCount > 0) {
          App.sustainedHighRmsCount = Math.max(0, App.sustainedHighRmsCount - 1);
        }
      }

      // Barge-in logic (sustained high RMS required during AI playback)
      const sustainFramesNeeded = aiLoud ? 5 : 1;
      const canBargeIn = aiLoud && rms > dynamicBargeThresh && App.sustainedHighRmsCount >= sustainFramesNeeded;

      if (canBargeIn) {
        const now = Date.now();
        if (now - App.lastInterruptAt > 500) {
          App.lastInterruptAt = now;
          App.currentTurn++; // Increment turn immediately upon barge-in recognition
          App.activeTurnId = App.currentTurn;
          stopPlayback();
          // Reset backendState immediately so VAD and voice threshold return to normal
          App.backendState = 'Listening';
          setStatus('Listening', 'listening');

          workerSend({ type: 'send_control', control: 'interrupt', reason: 'barge_in', turn_id: App.currentTurn });
          App.sustainedHighRmsCount = 0;

          // Send pre-roll buffer immediately since we just barged in
          App.audioSending = true;
          for (const preFrame of App.preRollBuffer) {
            for (let i = 0; i < preFrame.length; i++) App.pcmQueue.push(preFrame[i]);
          }
          App.preRollBuffer = [];

          appendDebug(`barge-in interrupt sent (activeTurnId -> ${App.activeTurnId})`);
        }
      }

      // Software AEC (Acoustic Echo Cancellation)
      // If AI is playing back out loud, we aggressively drop frames so ASR doesn't transcribe the AI's own speech.
      // Exception: If user barged in, aiLoud becomes false immediately (because stopPlayback clears playing state).
      if (aiLoud) {
        App.preRollBuffer = []; // Clear pre-roll too to prevent AI echo buffering
        return; // Drop microphone frame completely
      }

      // Downsample and forward audio to Worker for WS sending
      // Silent frame filtering: only send audio when voice is active
      const int16 = downsampleToPCM16(floatChunk, App.sampleRateIn, 16000);

      // Decide whether to send this frame
      const voiceDetected = rms > App.voiceThreshold;
      if (voiceDetected) {
        // Voice detected: flush pre-roll buffer first (if not already sending)
        if (!App.audioSending) {
          App.audioSending = true;
          // Send buffered pre-roll frames so ASR has onset context
          for (const preFrame of App.preRollBuffer) {
            for (let i = 0; i < preFrame.length; i++) App.pcmQueue.push(preFrame[i]);
          }
          App.preRollBuffer = [];
        }
        App.silentFramesSinceVoice = 0;
      } else {
        App.silentFramesSinceVoice++;
        if (App.audioSending && App.silentFramesSinceVoice > App.silentTailFrames) {
          // Silence long enough: stop sending, switch to buffering
          App.audioSending = false;
          App.pcmQueue = [];
        }
      }

      if (App.audioSending || App.utteranceActive) {
        // Active: send audio to ASR
        for (let i = 0; i < int16.length; i++) App.pcmQueue.push(int16[i]);
        while (App.pcmQueue.length >= App.frameSamples16k) {
          const frame = new Int16Array(App.pcmQueue.splice(0, App.frameSamples16k));
          workerSend({ type: 'send_audio', data: frame.buffer }, [frame.buffer]);
        }
      } else {
        // Silent: buffer frames for pre-roll
        App.preRollBuffer.push(int16);
        if (App.preRollBuffer.length > App.preRollMaxFrames) {
          App.preRollBuffer.shift();
        }
      }
    }

    function downsampleToPCM16(float32, inRate, outRate) {
      if (!float32 || float32.length === 0) return new Int16Array(0);
      if (inRate <= outRate) {
        const out = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) { const s = Math.max(-1, Math.min(1, float32[i])); out[i] = s < 0 ? s * 32768 : s * 32767; }
        return out;
      }
      const ratio = inRate / outRate;
      const outLen = Math.floor(float32.length / ratio);
      const out = new Int16Array(outLen);
      for (let i = 0; i < outLen; i++) { const s = Math.max(-1, Math.min(1, float32[Math.floor(i * ratio)] || 0)); out[i] = s < 0 ? s * 32768 : s * 32767; }
      return out;
    }

    // ── Start / Stop ───────────────────────────────────────────────────
    async function startAll() {
      if (App.running) return;
      try {
        setupWorker();
        // Connect WS via Worker
        const wsUrl = `ws://${location.host}/ws`;
        await new Promise((resolve, reject) => {
          const handler = (e) => {
            if (e.data.type === 'ws_open') { ioWorker.removeEventListener('message', handler); resolve(); }
            if (e.data.type === 'ws_error') { ioWorker.removeEventListener('message', handler); reject(new Error('ws error')); }
          };
          ioWorker.addEventListener('message', handler);
          workerSend({ type: 'connect', url: wsUrl });
        });

        await startMic();
        App.running = true;
        setButtons(true);
        App.currentAIMsg = null;
        App.currentPartialMsg = null;
        App.pendingChunkMeta = [];
        App.playbackQueue = [];
        App.activeTurnId = 1;
        App.currentTurn = 1;
        workerSend({ type: 'start', turn_id: App.currentTurn });
        setStatus('Connecting', 'listening');
        addChatMsg('system', '对话已开始，请说话...', 0);
      } catch (err) {
        appendDebug(`start failed: ${err.message}`);
        stopAll('start failed');
      }
    }

    function stopAll(reason) {
      workerSend({ type: 'stop', turn_id: App.currentTurn });
      stopPlayback();
      stopMic();
      App.running = false;
      setButtons(false);
      setStatus('Idle', '');
      if (reason) addChatMsg('system', `对话结束: ${reason}`, 0);
    }

    // ── Visibility change: force AudioContext resume ────────────────────
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && App.running && App.audioCtx) {
        App.audioCtx.resume().then(() => appendDebug('AudioContext resumed on tab focus'));
      }
    });

    el.startBtn.addEventListener('click', () => startAll());
    el.stopBtn.addEventListener('click', () => stopAll('手动停止'));
    window.addEventListener('beforeunload', () => stopAll('page unload'));

    loadVersion();
  </script>
</body>
